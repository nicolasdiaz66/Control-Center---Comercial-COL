  state.data.forEach(d => { estadoCounts[d.estado] = (estadoCounts[d.estado] || 0) + 1; });

  document.getElementById('sidebar-estados').innerHTML = Object.entries(estadoCounts).sort((a,b) => b[1] - a[1]).map(([e, n]) => `
    <div class="filter-item ${state.filters.estados.has(e) ? 'active' : ''}" data-type="estado" data-value="${escapeAttr(e)}">
      <div class="filter-check"></div>
      <span class="filter-name">${e}</span>
      <span class="filter-count">${n}</span>
    </div>
  `).join('');

  const eActive = state.filters.estados.size;
  const eEl = document.getElementById('estados-count');
  eEl.firstChild.nodeValue = eActive ? `${eActive} activos ` : `${Object.keys(estadoCounts).length} `;
  eEl.classList.toggle('has-active', eActive > 0);

  const mesCounts = {};
  state.data.forEach(d => {
    if (!d.fecha) return;
    const key = `${d.fecha.getFullYear()}-${String(d.fecha.getMonth()+1).padStart(2,'0')}`;
    mesCounts[key] = (mesCounts[key] || 0) + 1;
  });
  const mesesOrdenados = Object.keys(mesCounts).sort();
  const nowKey = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

  document.getElementById('sidebar-meses').innerHTML = mesesOrdenados.map(key => {
    const [y, m] = key.split('-').map(Number);
    const label = `${MES_LARGO[m-1]} '${String(y).slice(-2)}`;
    const isCurrent = key === nowKey;
    return `
      <div class="filter-item ${state.filters.meses.has(key) ? 'active' : ''}" data-type="mes" data-value="${key}">
        <div class="filter-check"></div>
        <span class="filter-name">${label}${isCurrent ? ' · hoy' : ''}</span>
        <span class="filter-count">${mesCounts[key]}</span>
      </div>
    `;
  }).join('');

  const mActive = state.filters.meses.size;
  const mEl = document.getElementById('meses-count');
  mEl.firstChild.nodeValue = mActive ? `${mActive} activos ` : `${mesesOrdenados.length} `;
  mEl.classList.toggle('has-active', mActive > 0);

  document.querySelectorAll('.filter-item').forEach(el => {
    el.addEventListener('click', () => {
      const type = el.dataset.type;
      const value = unescapeAttr(el.dataset.value);
      const setKey = type === 'frente' ? 'frentes' : (type === 'estado' ? 'estados' : 'meses');
      if (state.filters[setKey].has(value)) state.filters[setKey].delete(value);
      else state.filters[setKey].add(value);

      // Si estamos en una vista que no respeta filtros, saltar a Lista
      const vistasSinFiltro = ['home', 'tableros', 'metrics'];
      if (vistasSinFiltro.includes(state.view)) {
        setActiveView('checklist');
        return;
      }

      buildSidebar();
      renderAll();
    });
  });
}

function escapeAttr(s) { return s.replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
function unescapeAttr(s) { return s.replace(/&quot;/g, '"').replace(/&#39;/g, "'"); }

function toggleSection(id) {
  document.getElementById(id).classList.toggle('collapsed');
}

function resetFilters() {
  state.filters.frentes.clear();
  state.filters.estados.clear();
  state.filters.meses.clear();
  state.filters.quick = null;
  state.filters.search = '';
  document.getElementById('search').value = '';
  document.getElementById('search-box').classList.remove('has-value');
  buildSidebar();
  renderAll();
}

function bindControls() {
  const search = document.getElementById('search');
  const searchBox = document.getElementById('search-box');
  const clear = document.getElementById('search-clear');

  search.addEventListener('input', e => {
    state.filters.search = e.target.value.toLowerCase();
    searchBox.classList.toggle('has-value', !!e.target.value);

    // Si estamos en una vista que no respeta filtros y el usuario busca algo, saltar a Lista
    const vistasSinFiltro = ['home', 'tableros', 'metrics'];
    if (vistasSinFiltro.includes(state.view) && e.target.value) {
      setActiveView('checklist');
      return;
    }

    renderAll();
  });

  clear.addEventListener('click', () => {
    search.value = '';
    state.filters.search = '';
    searchBox.classList.remove('has-value');
    renderAll();
    search.focus();
  });

  document.querySelectorAll('.view-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      setActiveView(tab.dataset.view);
    });
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeDrawer();
    if (e.key === '/' && document.activeElement !== search) {
      e.preventDefault();
      search.focus();
    }
  });
}

function setActiveView(viewName) {
  state.view = viewName;

  // Actualizar tabs del topbar
  document.querySelectorAll('.view-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.view === viewName);
  });

  // Actualizar botón Mi semana del sidebar
  const homeBtn = document.getElementById('btn-home');
  if (homeBtn) homeBtn.classList.toggle('active', viewName === 'home');

  // Mostrar vista correcta
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  const viewEl = document.getElementById('view-' + viewName);
  if (viewEl) viewEl.classList.add('active');

  renderAll();
}

function goToHome() {
  setActiveView('home');
}

function filteredData() {
  const now = new Date();
  const weekEnd = new Date(now.getTime() + 7*86400000);

  return state.data.filter(d => {
    if (state.filters.quick === 'today') {
      if (!d.fecha || d.fecha.toDateString() !== now.toDateString()) return false;
    }
    if (state.filters.quick === 'week') {
      if (!d.fecha || d.fecha < now || d.fecha > weekEnd) return false;
    }
    if (state.filters.quick === 'overdue') {
      if (!d.fecha || d.fecha >= now || d.estado.toLowerCase() === 'finalizado') return false;
    }

    if (state.filters.frentes.size && !state.filters.frentes.has(d.frente)) return false;
    if (state.filters.estados.size && !state.filters.estados.has(d.estado)) return false;

    if (state.filters.meses.size) {
      if (!d.fecha) return false;
      const key = `${d.fecha.getFullYear()}-${String(d.fecha.getMonth()+1).padStart(2,'0')}`;
      if (!state.filters.meses.has(key)) return false;
    }

    if (state.filters.search) {
      const hay = (d.actividad + ' ' + d.proyecto + ' ' + d.notas + ' ' + d.frente).toLowerCase();
      if (!hay.includes(state.filters.search)) return false;
    }
    return true;
  });
}

function updateStats() {
  const data = filteredData();
  const total = data.length;
  const done = data.filter(d => d.estado.toLowerCase() === 'finalizado').length;
  const pending = data.filter(d => d.estado.toLowerCase() === 'pendiente').length;
  const progress = data.filter(d => /proceso|curso/i.test(d.estado)).length;
  const pct = total ? Math.round(done/total*100) : 0;

  const now = new Date();
  const weekEnd = new Date(now.getTime() + 7*86400000);
  const thisWeek = data.filter(d => d.fecha && d.fecha >= now && d.fecha <= weekEnd).length;
  const overdue = data.filter(d => d.fecha && d.fecha < now && d.estado.toLowerCase() !== 'finalizado').length;

  const isFiltered = state.filters.frentes.size || state.filters.estados.size || state.filters.meses.size || state.filters.quick || state.filters.search;

  document.getElementById('stats').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Actividades${isFiltered ? ' filtradas' : ''}</div>
      <div class="stat-row">
        <div class="stat-value">${total}</div>
      </div>
      <div class="stat-delta">${new Set(data.map(d => d.frente)).size} frentes activos</div>
    </div>

    <div class="stat-card primary" style="--stat-accent: var(--royal)">
      <div class="stat-label">Avance</div>
      <div class="stat-row">
        <div class="stat-value accent-royal">${pct}<span class="unit">%</span></div>
      </div>
      <div class="stat-delta">${done} de ${total} finalizadas</div>
      <div class="stat-progress"><div class="stat-progress-fill" style="width:${pct}%"></div></div>
    </div>

    <div class="stat-card">
      <div class="stat-label">En proceso</div>
      <div class="stat-row">
        <div class="stat-value ${progress > 0 ? 'accent-warn' : ''}">${progress}</div>
      </div>
      <div class="stat-delta">${pending} pendientes</div>
    </div>

    <div class="stat-card">
      <div class="stat-label">Esta semana</div>
      <div class="stat-row">
        <div class="stat-value">${thisWeek}</div>
      </div>
      <div class="stat-delta">próximos 7 días</div>
    </div>

    <div class="stat-card primary" style="--stat-accent: var(--state-overdue)">
      <div class="stat-label">Vencidas</div>
      <div class="stat-row">
        <div class="stat-value" style="color:${overdue > 0 ? '#FCA5A5' : 'var(--on-deep)'}">${overdue}</div>
      </div>
      <div class="stat-delta">${overdue > 0 ? 'requieren atención' : 'al día'}</div>
    </div>
  `;
}

function renderAll() {
  updateStats();
  if (state.view === 'home') renderHome();
  else if (state.view === 'checklist') renderChecklist();
  else if (state.view === 'gantt') renderGantt();
  else if (state.view === 'table') renderTable();
  else if (state.view === 'kanban') renderKanban();
  else if (state.view === 'metrics') renderMetrics();
  else if (state.view === 'tableros') renderTableros();
}

/* ==========================================================
   CHECKLIST VIEW
========================================================== */
function renderChecklist() {
  const data = filteredData();
  const container = document.getElementById('checklist');

  if (!data.length) {
    container.innerHTML = emptyState();
    return;
  }

  // Agrupar: Frente > Proyecto > Actividades
  const grouped = {};
  data.forEach(d => {
    if (!grouped[d.frente]) grouped[d.frente] = {};
    if (!grouped[d.frente][d.proyecto]) grouped[d.frente][d.proyecto] = [];
    grouped[d.frente][d.proyecto].push(d);
  });

  // Frentes ordenados: primero por posicion guardada, luego por volumen
  const frentes = Object.keys(grouped).sort((a,b) => {
    const oa = state.frenteOrden[a];
    const ob = state.frenteOrden[b];
    if (oa != null && ob != null) return oa - ob;
    if (oa != null) return -1;
    if (ob != null) return 1;
    const ac = Object.values(grouped[a]).reduce((s,arr) => s+arr.length, 0);
    const bc = Object.values(grouped[b]).reduce((s,arr) => s+arr.length, 0);
    return bc - ac;
  });

  const now = new Date();
  const weekEnd = new Date(now.getTime() + 7*86400000);

  // Resumen arriba
  const totalActs = data.length;
  const doneActs = data.filter(d => d.estado.toLowerCase() === 'finalizado').length;
  const progressActs = data.filter(d => /proceso|curso/i.test(d.estado)).length;
  const overdueActs = data.filter(d => d.fecha && d.fecha < now && d.estado.toLowerCase() !== 'finalizado').length;
  const pendingActs = totalActs - doneActs - progressActs - overdueActs;
  const globalPct = totalActs ? Math.round(doneActs/totalActs*100) : 0;

  let html = `
    <div class="cl-summary">
      <div class="cl-summary-title">
        ${totalActs} actividades · ${globalPct}% completado
      </div>
      <div class="cl-summary-stats">
        ${doneActs > 0 ? `<div class="cl-summary-stat"><span class="cl-summary-stat-dot done"></span>${doneActs} finalizadas</div>` : ''}
        ${progressActs > 0 ? `<div class="cl-summary-stat"><span class="cl-summary-stat-dot progress"></span>${progressActs} en proceso</div>` : ''}
        ${overdueActs > 0 ? `<div class="cl-summary-stat"><span class="cl-summary-stat-dot overdue"></span>${overdueActs} vencidas</div>` : ''}
        ${pendingActs > 0 ? `<div class="cl-summary-stat"><span class="cl-summary-stat-dot pending"></span>${pendingActs} pendientes</div>` : ''}
      </div>
    </div>
  `;

  frentes.forEach(frente => {
    const proyectos = grouped[frente];
    const total = Object.values(proyectos).reduce((s,arr) => s+arr.length, 0);
    const done = Object.values(proyectos).reduce((s,arr) =>
      s + arr.filter(t => t.estado.toLowerCase() === 'finalizado').length, 0);
    const frentePct = total ? Math.round(done/total*100) : 0;

    const proyectosOrdenados = Object.entries(proyectos).sort((a,b) => {
      const minA = Math.min(...a[1].map(t => t.fecha?.getTime() || Infinity));
      const minB = Math.min(...b[1].map(t => t.fecha?.getTime() || Infinity));
      return minA - minB;
    });

    html += `
      <div class="cl-frente" data-frente="${escapeAttr(frente)}" draggable="true">
        <div class="cl-frente-header" onclick="toggleFrente('${escapeAttr(frente)}')">
          <div class="cl-frente-drag-handle" title="Arrastra para reordenar" onclick="event.stopPropagation()">
            <svg viewBox="0 0 16 16" fill="none">
              <circle cx="5" cy="4" r="1.3" fill="currentColor"/>
              <circle cx="11" cy="4" r="1.3" fill="currentColor"/>
              <circle cx="5" cy="8" r="1.3" fill="currentColor"/>
              <circle cx="11" cy="8" r="1.3" fill="currentColor"/>
              <circle cx="5" cy="12" r="1.3" fill="currentColor"/>
              <circle cx="11" cy="12" r="1.3" fill="currentColor"/>
            </svg>
          </div>
          <svg class="cl-frente-chevron" viewBox="0 0 14 14" fill="none">
            <path d="M3 5l4 4 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <div class="cl-frente-name">${frente}</div>
          <div class="cl-frente-progress">
            <div class="cl-frente-pct">${frentePct}%</div>
            <div class="cl-frente-meta">${done}/${total}</div>
          </div>
        </div>
        <div class="cl-frente-body">
          ${proyectosOrdenados.map(([proj, tasks]) => {
            tasks.sort((a,b) => (a.fecha||0) - (b.fecha||0));
            const projDone = tasks.filter(t => t.estado.toLowerCase() === 'finalizado').length;
            const projPct = tasks.length ? Math.round(projDone/tasks.length*100) : 0;
            const projId = escapeAttr(frente + '::' + proj);

            return `
              <div class="cl-proyecto" data-proyecto="${projId}">
                <div class="cl-proyecto-header" onclick="toggleProyecto('${projId}')">
                  <svg class="cl-proyecto-chevron" viewBox="0 0 11 11" fill="none">
                    <path d="M3 4l2.5 2.5L8 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                  <div class="cl-proyecto-name">${proj}</div>
                  <div class="cl-proyecto-progress">
                    <div class="cl-proyecto-progress-bar">
                      <div class="cl-proyecto-progress-fill" style="width:${projPct}%"></div>
                    </div>
                    <div class="cl-proyecto-pct">${projPct}%</div>
                    <div class="cl-proyecto-meta">${projDone}/${tasks.length}</div>
                  </div>
                </div>
                <div class="cl-proyecto-body">
                  ${tasks.map(t => renderChecklistItem(t, now, weekEnd)).join('')}
                </div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;
  });

  container.innerHTML = html;

  container.querySelectorAll('.cl-actividad').forEach(el => {
    el.addEventListener('click', (e) => {
      // Si el click fue en el checkbox, toggle estado
      if (e.target.classList.contains('cl-check') || e.target.closest('.cl-check')) {
        e.stopPropagation();
        const idx = parseInt(el.dataset.idx);
        const task = state.data[idx];
        if (!task) return;

        const currentEstado = task.estado.toLowerCase();
        const newEstado = currentEstado === 'finalizado' ? 'Pendiente' : 'Finalizado';

        if (USE_SUPABASE && task.id) {
          updateActividad(task.id, { estado: newEstado });
        } else {
          // Fallback local
          task.estado = newEstado;
          renderAll();
        }
        return;
      }

      // Sino abre el drawer
      const idx = parseInt(el.dataset.idx);
      openDrawer(state.data[idx]);
    });
  });

  // Drag & drop para reordenar frentes
  setupFrenteDragDrop(container);
}

function setupFrenteDragDrop(container) {
  const frentes = container.querySelectorAll('.cl-frente');
  let dragged = null;

  frentes.forEach(frente => {
    frente.addEventListener('dragstart', (e) => {
      dragged = frente;
      frente.classList.add('dragging');
      // Hacer el drag más limpio
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', frente.dataset.frente);
    });

    frente.addEventListener('dragend', () => {
      frente.classList.remove('dragging');
      container.querySelectorAll('.cl-frente').forEach(f => f.classList.remove('drag-over-top', 'drag-over-bottom'));
      dragged = null;
    });

    frente.addEventListener('dragover', (e) => {
      if (!dragged || dragged === frente) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';

      const rect = frente.getBoundingClientRect();
      const midpoint = rect.top + rect.height / 2;

      // Limpiar todas las clases primero
      container.querySelectorAll('.cl-frente').forEach(f => {
        if (f !== frente) f.classList.remove('drag-over-top', 'drag-over-bottom');
      });

      if (e.clientY < midpoint) {
        frente.classList.add('drag-over-top');
        frente.classList.remove('drag-over-bottom');
      } else {
        frente.classList.add('drag-over-bottom');
        frente.classList.remove('drag-over-top');
      }
    });

    frente.addEventListener('dragleave', () => {
      frente.classList.remove('drag-over-top', 'drag-over-bottom');
    });

    frente.addEventListener('drop', (e) => {
      e.preventDefault();
      if (!dragged || dragged === frente) return;

      const rect = frente.getBoundingClientRect();
      const midpoint = rect.top + rect.height / 2;
      const insertBefore = e.clientY < midpoint;

      if (insertBefore) {
        frente.parentNode.insertBefore(dragged, frente);
      } else {
        frente.parentNode.insertBefore(dragged, frente.nextSibling);
      }

      frente.classList.remove('drag-over-top', 'drag-over-bottom');

      // Capturar nuevo orden y guardarlo
      const nuevoOrden = [...container.querySelectorAll('.cl-frente')].map(f => f.dataset.frente);
      guardarOrdenFrentes(nuevoOrden);
    });
  });
}

function renderChecklistItem(t, now, weekEnd) {
  const idx = state.data.indexOf(t);
  const estado = t.estado.toLowerCase().replace(/\s+/g, '-');
  const isOverdue = t.fecha && t.fecha < now && estado !== 'finalizado';
  const isToday = t.fecha && t.fecha.toDateString() === now.toDateString();
  const isSoon = t.fecha && !isToday && t.fecha >= now && t.fecha <= weekEnd;

  let classes = ['cl-actividad'];
  if (estado === 'finalizado') classes.push('done');
  else if (isOverdue) classes.push('overdue');
  else if (/proceso|curso/i.test(t.estado)) classes.push('progress');
  else if (estado === 'agendado') classes.push('scheduled');
  else classes.push('pending');

  let dateClass = '';
  if (estado === 'finalizado') dateClass = 'done';
  else if (isOverdue) dateClass = 'overdue';
  else if (isToday) dateClass = 'today';
  else if (isSoon) dateClass = 'soon';

  // Initials del responsable
  const resp = t.responsable || '';
  const initials = resp.split(/\s+/).filter(Boolean).slice(0, 2).map(s => s[0]).join('').toUpperCase() || '—';

  return `
    <div class="${classes.join(' ')}" data-idx="${idx}">
      <div class="cl-check"></div>
      <div class="cl-act-name">${t.actividad}</div>
      <div class="cl-act-date ${dateClass}">${t.fechaStr || '—'}</div>
      <div class="cl-act-responsable" title="${resp}">${initials}</div>
    </div>
  `;
}

function toggleFrente(frente) {
  const safeFrente = unescapeAttr(frente);
  const el = document.querySelector(`.cl-frente[data-frente="${escapeAttr(safeFrente)}"]`);
  if (el) el.classList.toggle('collapsed');
}

function toggleProyecto(projId) {
  const safeId = unescapeAttr(projId);
  const el = document.querySelector(`.cl-proyecto[data-proyecto="${escapeAttr(safeId)}"]`);
  if (el) el.classList.toggle('collapsed');
}

/* ==========================================================
   GANTT VIEW
========================================================== */
function renderGantt() {
  const data = filteredData().filter(d => d.fecha);
  const container = document.getElementById('gantt');

  if (!data.length) {
    container.innerHTML = emptyState();
    return;
  }

  const now = new Date();

  // Identificar vencidas para banner destacado
  const vencidas = data.filter(d => {
    const estado = d.estado.toLowerCase();
    return d.fecha < now && estado !== 'finalizado';
  }).sort((a, b) => a.fecha - b.fecha);

  // Rango de meses
  const fechas = data.map(d => d.fecha);
  let minD = new Date(Math.min(...fechas));
  let maxD = new Date(Math.max(...fechas));
  minD = new Date(minD.getFullYear(), minD.getMonth(), 1);
  maxD = new Date(maxD.getFullYear(), maxD.getMonth() + 1, 0);

  // Lista de meses
  const months = [];
  let m = new Date(minD);
  while (m <= maxD) {
    months.push(new Date(m));
    m.setMonth(m.getMonth() + 1);
  }

  // Agrupar por Frente > Proyecto
  const grouped = {};
  data.forEach(d => {
    if (!grouped[d.frente]) grouped[d.frente] = {};
    if (!grouped[d.frente][d.proyecto]) grouped[d.frente][d.proyecto] = [];
    grouped[d.frente][d.proyecto].push(d);
  });

  // Frentes ordenados: usar el orden guardado del drag & drop primero
  const frentes = Object.keys(grouped).sort((a,b) => {
    const oa = state.frenteOrden[a];
    const ob = state.frenteOrden[b];
    if (oa != null && ob != null) return oa - ob;
    if (oa != null) return -1;
    if (ob != null) return 1;
    const ac = Object.values(grouped[a]).reduce((s,arr) => s+arr.length, 0);
    const bc = Object.values(grouped[b]).reduce((s,arr) => s+arr.length, 0);
    return bc - ac;
  });

  // Ancho de cada mes según nivel de zoom
  // 'day': súper amplio (cada día ~60px = 1800px/mes)
  // 'week': amplio (cada día ~25px = 750px/mes)
  // 'month': mediano (cada día ~8px = 240px/mes)
  // 'quarter': compacto (cada día ~4px = 120px/mes)
  // 'all': se ajusta al viewport
  const zoomWidths = {
    'day': 1800,
    'week': 750,
    'month': 240,
    'quarter': 120
  };

  let monthWidth;
  if (state.ganttZoom === 'all') {
    // Ajustar para que todos los meses quepan en el viewport
    const viewportW = window.innerWidth;
    const labelW = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--label-col-w')) || 280;
    const availableW = viewportW - labelW - 100;
    monthWidth = Math.max(100, Math.round(availableW / months.length));
  } else {
    monthWidth = zoomWidths[state.ganttZoom] || 240;
  }
  const trackWidth = months.length * monthWidth;

  // Helper: convertir fecha a pixel
  const dateToPx = (date) => {
    const monthIdx = months.findIndex(m =>
      m.getFullYear() === date.getFullYear() && m.getMonth() === date.getMonth()
    );
    if (monthIdx === -1) {
      console.warn('[Gantt] Fecha fuera de rango:', date);
      if (date < months[0]) return 5;
      return months.length * monthWidth - 15;
    }
    const daysInMonth = new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
    const dayOfMonth = date.getDate();
    return monthIdx * monthWidth + ((dayOfMonth - 0.5) / daysInMonth) * monthWidth;
  };

  const todayX = (now >= minD && now <= maxD) ? dateToPx(now) : null;
  const nowMonth = now.getMonth(), nowYear = now.getFullYear();

  // Leyenda + banner de vencidas (si hay)
  let html = '';

  if (vencidas.length > 0) {
    html += `
      <div class="gantt-overdue-banner">
        <div class="gantt-overdue-banner-header">
          <div class="gantt-overdue-banner-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><circle cx="12" cy="17" r="0.8" fill="currentColor"/></svg>
            <span>${vencidas.length} ${vencidas.length === 1 ? 'actividad vencida' : 'actividades vencidas'}</span>
          </div>
          <button class="gantt-overdue-toggle" onclick="toggleOverdueList(event)">Ver lista</button>
        </div>
        <div class="gantt-overdue-list" style="display:none">
          ${vencidas.slice(0, 10).map(v => {
            const idx = state.data.indexOf(v);
            const diasVencida = Math.floor((now - v.fecha) / 86400000);
            return `
              <div class="gantt-overdue-item" data-idx="${idx}">
                <div class="gantt-overdue-item-dot"></div>
                <div class="gantt-overdue-item-content">
                  <div class="gantt-overdue-item-title">${escapeHtml(v.actividad)}</div>
                  <div class="gantt-overdue-item-meta">${escapeHtml(v.frente)} · ${escapeHtml(v.proyecto)} · Venció hace ${diasVencida} ${diasVencida === 1 ? 'día' : 'días'} (${v.fechaStr})</div>
                </div>
                <div class="gantt-overdue-item-estado">${escapeHtml(v.estado)}</div>
              </div>
            `;
          }).join('')}
          ${vencidas.length > 10 ? `<div class="gantt-overdue-more">Y ${vencidas.length - 10} más…</div>` : ''}
        </div>
      </div>
    `;
  }

  html += `
    <div class="gantt-legend">
      <div class="gantt-legend-items">
        <div class="gantt-legend-item"><div class="gantt-legend-dot done"></div>Finalizado</div>
        <div class="gantt-legend-item"><div class="gantt-legend-dot progress"></div>En proceso</div>
        <div class="gantt-legend-item"><div class="gantt-legend-dot pending"></div>Pendiente</div>
        <div class="gantt-legend-item"><div class="gantt-legend-dot scheduled"></div>Agendado</div>
        <div class="gantt-legend-item"><div class="gantt-legend-dot overdue"></div>Vencida</div>
        ${todayX !== null ? '<div class="gantt-legend-today">HOY</div>' : ''}
      </div>
      <div class="gantt-zoom-controls">
        <span class="gantt-zoom-label">Zoom:</span>
        <button class="gantt-zoom-btn ${state.ganttZoom === 'day' ? 'active' : ''}" onclick="setGanttZoom('day')" title="Vista diaria — cada día es una columna">Día</button>
        <button class="gantt-zoom-btn ${state.ganttZoom === 'week' ? 'active' : ''}" onclick="setGanttZoom('week')" title="Vista semanal — ticks cada lunes">Semana</button>
        <button class="gantt-zoom-btn ${state.ganttZoom === 'month' ? 'active' : ''}" onclick="setGanttZoom('month')" title="Vista mensual — balance default">Mes</button>
        <button class="gantt-zoom-btn ${state.ganttZoom === 'quarter' ? 'active' : ''}" onclick="setGanttZoom('quarter')" title="Vista trimestral — más comprimida">Trim.</button>
        <button class="gantt-zoom-btn ${state.ganttZoom === 'all' ? 'active' : ''}" onclick="setGanttZoom('all')" title="Ajustar al tamaño de pantalla">Todo</button>
        ${todayX !== null ? `<button class="gantt-zoom-btn gantt-goto-today" onclick="scrollGanttToToday()" title="Ir a hoy">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="12" x2="12" y2="7"/><line x1="12" y1="12" x2="15" y2="13"/></svg>
        </button>` : ''}
      </div>
    </div>
  `;

  // Viewport scrolleable + arrows laterales + shadows indicadoras
  html += `
    <div class="gantt-scroll-wrapper">
      <button class="gantt-nav-arrow left" id="gantt-nav-left" onclick="scrollGantt('left')" title="Desplazar a la izquierda">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button class="gantt-nav-arrow right" id="gantt-nav-right" onclick="scrollGantt('right')" title="Desplazar a la derecha">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <div class="gantt-scroll-shadow left" id="gantt-shadow-left"></div>
      <div class="gantt-scroll-shadow right" id="gantt-shadow-right"></div>
      <div class="gantt-scroll-viewport" id="gantt-scroll-viewport">
  `;

  // Container (dentro del viewport)
  html += `<div class="gantt-container" style="width:${parseInt(getComputedStyle(document.documentElement).getPropertyValue('--label-col-w')) + trackWidth}px">`;

  // Header meses (con subdivisiones según zoom)
  const showDays = state.ganttZoom === 'day';
  const showWeeks = state.ganttZoom === 'week';

  html += `
    <div class="gantt-months">
      <div class="gantt-months-label">Frente · Proyecto</div>
      <div class="gantt-months-track" style="width:${trackWidth}px">
        ${months.map((m, i) => {
          const isCurrent = m.getMonth() === nowMonth && m.getFullYear() === nowYear;
          const daysInMonth = new Date(m.getFullYear(), m.getMonth() + 1, 0).getDate();
          const dayW = monthWidth / daysInMonth;

          let subdivisions = '';
          if (showDays) {
            // Un tick por cada día
            subdivisions = `<div class="gantt-month-subdivs">`;
            for (let d = 1; d <= daysInMonth; d++) {
              const isToday = m.getFullYear() === now.getFullYear() && m.getMonth() === now.getMonth() && d === now.getDate();
              const dayDate = new Date(m.getFullYear(), m.getMonth(), d);
              const dayOfWeek = dayDate.getDay(); // 0=domingo, 6=sábado
              const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
              subdivisions += `<div class="gantt-day-tick ${isToday ? 'today' : ''} ${isWeekend ? 'weekend' : ''}" style="left:${(d-1)*dayW}px; width:${dayW}px">${d}</div>`;
            }
            subdivisions += `</div>`;
          } else if (showWeeks) {
            // Un tick por cada semana (lunes)
            subdivisions = `<div class="gantt-month-subdivs">`;
            for (let d = 1; d <= daysInMonth; d++) {
              const dayDate = new Date(m.getFullYear(), m.getMonth(), d);
              if (dayDate.getDay() === 1 || d === 1) { // lunes o día 1
                const label = d === 1 ? '1' : `${d}`;
                subdivisions += `<div class="gantt-week-tick" style="left:${(d-1)*dayW}px">${label}</div>`;
              }
            }
            subdivisions += `</div>`;
          }

          return `
            <div class="gantt-month-cell ${isCurrent ? 'current' : ''}" style="left:${i*monthWidth}px; width:${monthWidth}px">
              <div class="gantt-month-label">${MES_LARGO[m.getMonth()]}<span class="year">'${String(m.getFullYear()).slice(-2)}</span></div>
              ${subdivisions}
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;

  // Body
  html += `<div class="gantt-body">`;

  // Línea del hoy
  if (todayX !== null) {
    const labelColW = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--label-col-w'));
    html += `<div class="gantt-today-line" style="left:${labelColW + todayX}px"></div>`;
  }

  frentes.forEach(frente => {
    const proyectos = grouped[frente];
    const total = Object.values(proyectos).reduce((s,arr) => s+arr.length, 0);

    const proyectosOrdenados = Object.entries(proyectos).sort((a,b) => {
      const minA = Math.min(...a[1].map(t => t.fecha.getTime()));
      const minB = Math.min(...b[1].map(t => t.fecha.getTime()));
      return minA - minB;
    });

    html += `
      <div class="gantt-frente" data-gantt-frente="${escapeAttr(frente)}">
        <div class="gantt-frente-header" onclick="toggleGanttFrente('${escapeAttr(frente)}')">
          <div class="gantt-frente-label">
            <svg class="gantt-frente-chevron" viewBox="0 0 12 12" fill="none">
              <path d="M3 4l3 3 3-3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <div class="gantt-frente-name">${frente}</div>
            <div class="gantt-frente-meta">${total}</div>
          </div>
          <div class="gantt-frente-track"></div>
        </div>
        <div class="gantt-projects">
          ${proyectosOrdenados.map(([proj, tasks]) => {
            tasks.sort((a,b) => a.fecha - b.fecha);

            // Agrupar marquillas por día (para no superponerlas en la misma posición exacta)
            const tasksByPx = {};
            tasks.forEach(t => {
              const px = Math.round(dateToPx(t.fecha));
              // Agrupar con tolerancia de 8px
              const key = Math.floor(px / 8) * 8;
              if (!tasksByPx[key]) tasksByPx[key] = [];
              tasksByPx[key].push(t);
            });

            return `
              <div class="gantt-proyecto">
                <div class="gantt-proyecto-label">
                  <span class="gantt-proyecto-name">${proj}</span>
                  <span class="gantt-proyecto-count">${tasks.length}</span>
                </div>
                <div class="gantt-proyecto-track" style="width:${trackWidth}px">
                  ${months.map((m, i) => {
                    const isCurrent = m.getMonth() === nowMonth && m.getFullYear() === nowYear;
                    return `<div class="gantt-month-bg ${isCurrent ? 'current' : ''}" style="left:${i*monthWidth}px; width:${monthWidth}px"></div>`;
                  }).join('')}
                  ${Object.entries(tasksByPx).map(([px, group]) => {
                    if (group.length === 1) {
                      return renderGanttMarker(group[0], parseInt(px), now);
                    } else {
                      // Varias marcas en el mismo día: mostrar la más crítica + contador
                      const critical = pickCriticalTask(group, now);
                      const critPx = Math.round(dateToPx(critical.fecha));
                      return `
                        <div class="gantt-marker-group" style="left:${critPx - 11}px">
                          ${renderGanttMarker(critical, 0, now, true)}
                          <div class="gantt-marker-count">${group.length}</div>
                        </div>
                      `;
                    }
                  }).join('')}
                </div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;
  });

  html += `</div>`; // body
  html += `</div>`; // container
  html += `</div></div>`; // cerrar gantt-scroll-viewport y gantt-scroll-wrapper

  container.innerHTML = html;

  // Bind tooltips y clicks
  const tooltip = ensureGanttTooltip();
  container.querySelectorAll('.gantt-marker').forEach(m => {
    m.addEventListener('mouseenter', e => {
      const idxs = m.dataset.idxs.split(',').map(Number);
      const items = idxs.map(i => state.data[i]);
      tooltip.innerHTML = renderGanttTooltipContent(items);
      tooltip.classList.add('visible');
      positionTooltip(e, tooltip);
    });
    m.addEventListener('mousemove', e => positionTooltip(e, tooltip));
    m.addEventListener('mouseleave', () => tooltip.classList.remove('visible'));
    m.addEventListener('click', e => {
      e.stopPropagation();
      const idxs = m.dataset.idxs.split(',').map(Number);
      if (idxs.length === 1) {
        openDrawer(state.data[idxs[0]]);
      } else {
        // Para grupos: mostrar el más crítico en drawer
        const items = idxs.map(i => state.data[i]);
        const crit = pickCriticalTask(items, new Date());
        openDrawer(crit);
      }
    });
  });

  // Click también en .gantt-marker-group
  container.querySelectorAll('.gantt-marker-group').forEach(g => {
    g.addEventListener('click', e => {
      e.stopPropagation();
      const m = g.querySelector('.gantt-marker');
      if (m) {
        const idxs = m.dataset.idxs.split(',').map(Number);
        const items = idxs.map(i => state.data[i]);
        const crit = pickCriticalTask(items, new Date());
        openDrawer(crit);
      }
    });
  });

  // Bind clicks en items de banner de vencidas
  container.querySelectorAll('.gantt-overdue-item').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.idx);
      if (!isNaN(idx) && state.data[idx]) {
        openDrawer(state.data[idx]);
      }
    });
  });

  // Auto-scroll al hoy y bind de listeners para indicadores
  setTimeout(() => {
    const viewport = document.getElementById('gantt-scroll-viewport');
    if (!viewport) return;

    // Listener: actualizar arrows y shadows cada vez que el usuario scrollea
    viewport.addEventListener('scroll', updateGanttScrollIndicators);

    // Scroll inicial a hoy
    if (todayX !== null) {
      const labelColW = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--label-col-w')) || 280;
      const targetScroll = labelColW + todayX - viewport.clientWidth / 2;
      viewport.scrollLeft = Math.max(0, targetScroll);
    }

    // Actualizar indicadores iniciales
    updateGanttScrollIndicators();
  }, 50);
}

function toggleOverdueList(event) {
  event.stopPropagation();
  const banner = event.target.closest('.gantt-overdue-banner');
  if (!banner) return;
  const list = banner.querySelector('.gantt-overdue-list');
  const btn = banner.querySelector('.gantt-overdue-toggle');
  if (list.style.display === 'none') {
    list.style.display = 'block';
    btn.textContent = 'Ocultar';
  } else {
    list.style.display = 'none';
    btn.textContent = 'Ver lista';
  }
}

// Cambiar nivel de zoom del Gantt
function setGanttZoom(nivel) {
  state.ganttZoom = nivel;
  renderGantt();
  // Auto-scroll a hoy después del re-render
  setTimeout(scrollGanttToToday, 100);
}

// Scroll horizontal del Gantt para centrar el día de hoy
function scrollGanttToToday() {
  const viewport = document.getElementById('gantt-scroll-viewport');
  if (!viewport) return;
  const todayLine = viewport.querySelector('.gantt-today-line');
  if (!todayLine) return;

  const todayX = parseInt(todayLine.style.left) || 0;

  const targetScroll = todayX - viewport.clientWidth / 2;
  viewport.scrollTo({
    left: Math.max(0, targetScroll),
    behavior: 'smooth'
  });
}

// Scroll horizontal con flechas laterales
function scrollGantt(direction) {
  const viewport = document.getElementById('gantt-scroll-viewport');
  if (!viewport) return;

  // Desplazar una "página" (80% del ancho visible)
  const step = Math.round(viewport.clientWidth * 0.8);
  const delta = direction === 'left' ? -step : step;

  viewport.scrollBy({
    left: delta,
    behavior: 'smooth'
  });
}

// Actualiza visibilidad de arrows y shadows según posición del scroll
function updateGanttScrollIndicators() {
  const viewport = document.getElementById('gantt-scroll-viewport');
  if (!viewport) return;

  const leftArrow = document.getElementById('gantt-nav-left');
  const rightArrow = document.getElementById('gantt-nav-right');
  const leftShadow = document.getElementById('gantt-shadow-left');
  const rightShadow = document.getElementById('gantt-shadow-right');

  const canScrollLeft = viewport.scrollLeft > 10;
  const canScrollRight = viewport.scrollLeft < (viewport.scrollWidth - viewport.clientWidth - 10);

  if (leftArrow) leftArrow.disabled = !canScrollLeft;
  if (rightArrow) rightArrow.disabled = !canScrollRight;

  if (leftShadow) leftShadow.classList.toggle('visible', canScrollLeft);
  if (rightShadow) rightShadow.classList.toggle('visible', canScrollRight);
}

function renderGanttMarker(t, px, now, isInGroup) {
  const idx = state.data.indexOf(t);
  const estado = t.estado.toLowerCase().replace(/\s+/g, '-');
  const isOverdue = t.fecha && t.fecha < now && estado !== 'finalizado';

  let statusClass = 'pending';
  if (estado === 'finalizado') statusClass = 'done';
  else if (isOverdue) statusClass = 'overdue';
  else if (/proceso|curso/i.test(t.estado)) statusClass = 'progress';
  else if (estado === 'agendado') statusClass = 'scheduled';

  const style = isInGroup ? '' : `style="left:${px - 11}px"`;

  return `
    <div class="gantt-marker ${statusClass}" ${style} data-idxs="${idx}">
      <div class="gantt-marker-pin"></div>
    </div>
  `;
}

function pickCriticalTask(tasks, now) {
  // Prioridad: vencidas > en proceso > agendado > pendiente > finalizado
  const priority = (t) => {
    const estado = t.estado.toLowerCase();
    const isOverdue = t.fecha && t.fecha < now && estado !== 'finalizado';
    if (isOverdue) return 5;
    if (/proceso|curso/i.test(t.estado)) return 4;
    if (estado === 'agendado') return 3;
    if (estado === 'pendiente') return 2;
    if (estado === 'finalizado') return 1;
    return 0;
  };
  return tasks.slice().sort((a,b) => priority(b) - priority(a))[0];
}

function renderGanttTooltipContent(items) {
  if (items.length === 1) {
    const t = items[0];
    const estado = t.estado.toLowerCase().replace(/\s+/g, '-');
    const now = new Date();
    const isOverdue = t.fecha && t.fecha < now && estado !== 'finalizado';
    const statusLabel = isOverdue ? 'Vencida' : t.estado;
    const statusColor = isOverdue ? 'var(--state-overdue)' :
                        estado === 'finalizado' ? 'var(--state-done)' :
                        /proceso|curso/i.test(t.estado) ? 'var(--state-progress)' :
                        estado === 'agendado' ? 'var(--state-scheduled)' :
                        'var(--state-pending)';
    return `
      <div class="gantt-tooltip-date">${t.fechaStr} · ${t.proyecto}</div>
      <div class="gantt-tooltip-activity">${t.actividad}</div>
      <span class="gantt-tooltip-status" style="--tip-color:${statusColor}">${statusLabel}</span>
    `;
  } else {
    return `
      <div class="gantt-tooltip-date">${items[0].fechaStr}</div>
      <div class="gantt-tooltip-activity" style="font-weight:700">${items.length} actividades ese día</div>
      <div style="font-size:11px; color:rgba(255,255,255,0.7); margin-top:4px">Click para ver detalle</div>
    `;
  }
}

function ensureGanttTooltip() {
  let tooltip = document.getElementById('gantt-tooltip');
  if (!tooltip) {
    tooltip = document.createElement('div');
    tooltip.id = 'gantt-tooltip';
    tooltip.className = 'gantt-tooltip';
    document.body.appendChild(tooltip);
  }
  return tooltip;
}

function positionTooltip(e, tip) {
  const padding = 14;
  let x = e.clientX + padding;
  let y = e.clientY + padding;
  const rect = tip.getBoundingClientRect();
  if (x + rect.width > window.innerWidth - 10) x = e.clientX - rect.width - padding;
  if (y + rect.height > window.innerHeight - 10) y = e.clientY - rect.height - padding;
  tip.style.left = x + 'px';
  tip.style.top = y + 'px';
}

function toggleGanttFrente(frente) {
  const safeFrente = unescapeAttr(frente);
  const el = document.querySelector(`.gantt-frente[data-gantt-frente="${escapeAttr(safeFrente)}"]`);
  if (el) el.classList.toggle('collapsed');
}

/* ==========================================================
   TABLE
========================================================== */
function renderTable() {
  const data = filteredData();
  const container = document.getElementById('data-table');

  if (!data.length) {
    container.innerHTML = `<tbody><tr><td>${emptyState()}</td></tr></tbody>`;
    return;
  }

  const sorted = [...data].sort((a, b) => {
    const col = state.sort.col;
    const dir = state.sort.dir === 'asc' ? 1 : -1;
    let va, vb;
    if (col === 'fecha') { va = a.fecha || 0; vb = b.fecha || 0; }
    else { va = (a[col] || '').toString().toLowerCase(); vb = (b[col] || '').toString().toLowerCase(); }
    return va < vb ? -dir : va > vb ? dir : 0;
  });

  const now = new Date();
  const sortIcon = (col) => state.sort.col === col ? (state.sort.dir === 'asc' ? '▲' : '▼') : '';
  const sortedCls = (col) => state.sort.col === col ? 'sorted' : '';

  container.innerHTML = `
    <thead>
      <tr>
        <th class="${sortedCls('frente')}" data-sort="frente">Frente <span class="sort-icon">${sortIcon('frente')}</span></th>
        <th class="${sortedCls('proyecto')}" data-sort="proyecto">Proyecto <span class="sort-icon">${sortIcon('proyecto')}</span></th>
        <th class="${sortedCls('actividad')}" data-sort="actividad">Actividad <span class="sort-icon">${sortIcon('actividad')}</span></th>
        <th class="${sortedCls('fecha')}" data-sort="fecha">Fecha <span class="sort-icon">${sortIcon('fecha')}</span></th>
        <th class="${sortedCls('estado')}" data-sort="estado">Estado <span class="sort-icon">${sortIcon('estado')}</span></th>
      </tr>
    </thead>
    <tbody>
      ${sorted.map(t => {
        const estado = t.estado.toLowerCase().replace(/\s+/g, '-');
        const isOverdue = t.fecha && t.fecha < now && estado !== 'finalizado';
        const idx = state.data.indexOf(t);
        return `
          <tr data-idx="${idx}">
            <td><span class="td-frente"><span class="td-frente-dot"></span>${t.frente}</span></td>
            <td><span class="td-project">${t.proyecto}</span></td>
            <td><span class="td-activity">${t.actividad}</span></td>
            <td><span class="td-date ${isOverdue ? 'overdue' : ''}">${t.fechaStr}</span></td>
            <td><span class="status-chip status-${estado}">${t.estado}</span></td>
          </tr>
        `;
      }).join('')}
    </tbody>
  `;

  container.querySelectorAll('th[data-sort]').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.sort;
      if (state.sort.col === col) state.sort.dir = state.sort.dir === 'asc' ? 'desc' : 'asc';
      else { state.sort.col = col; state.sort.dir = 'asc'; }
      renderTable();
    });
  });
  container.querySelectorAll('tr[data-idx]').forEach(tr => {
    tr.addEventListener('click', () => {
      const idx = parseInt(tr.dataset.idx);
      openDrawer(state.data[idx]);
    });
  });
}

function renderTableroCard(t) {
  const openUrl = t.tableau_url;

  // Icono según la categoría (o primera letra del título si no hay match)
  const iconoPorCategoria = {
    'Ejecutivos': '📊',
    'Operaciones': '⚙️',
    'Canales': '🌐',
    'Marketing': '📢',
    'Producto': '🧩',
    'Growth': '📈',
    'Finanzas': '💰',
    'Ventas': '💼',
    'Análisis': '🔍',
    'General': '📋'
  };
  const icono = iconoPorCategoria[t.categoria] || '📋';

  // Color del acento según la categoría (hash de la categoría → color)
  const categoriaColor = (cat) => {
    const colors = [
      { bg: 'linear-gradient(135deg, #1F49B6 0%, #203478 100%)', accent: '#1F49B6' }, // Royal
      { bg: 'linear-gradient(135deg, #16A34A 0%, #15803D 100%)', accent: '#16A34A' }, // Verde
      { bg: 'linear-gradient(135deg, #F59E0B 0%, #D97706 100%)', accent: '#F59E0B' }, // Ámbar
      { bg: 'linear-gradient(135deg, #7C3AED 0%, #5B21B6 100%)', accent: '#7C3AED' }, // Violeta
      { bg: 'linear-gradient(135deg, #0891B2 0%, #0E7490 100%)', accent: '#0891B2' }, // Cyan
      { bg: 'linear-gradient(135deg, #DC2626 0%, #991B1B 100%)', accent: '#DC2626' }  // Rojo
    ];
    if (!cat) return colors[0];
    let hash = 0;
    for (let i = 0; i < cat.length; i++) hash += cat.charCodeAt(i);
    return colors[hash % colors.length];
  };
  const colorInfo = categoriaColor(t.categoria);

  return `
    <a href="${openUrl}" target="_blank" rel="noopener noreferrer" class="tablero-card-link">
      <div class="tablero-card" style="--card-accent: ${colorInfo.accent}">
        <div class="tablero-card-visual" style="background: ${colorInfo.bg}">
          <div class="tablero-card-icono">${icono}</div>
          <div class="tablero-card-pattern"></div>
        </div>
        <div class="tablero-card-info">
          <div class="tablero-card-info-main">
            <div class="tablero-card-title">${escapeHtml(t.titulo)}</div>
            ${t.descripcion ? `<div class="tablero-card-desc">${escapeHtml(t.descripcion)}</div>` : ''}
            ${t.categoria ? `<div class="tablero-card-category-tag" style="color: ${colorInfo.accent}; border-color: ${colorInfo.accent}33; background: ${colorInfo.accent}0D">${escapeHtml(t.categoria)}</div>` : ''}
          </div>
          <div class="tablero-card-footer">
            <div class="tablero-card-open-btn">
              <span>Abrir tablero</span>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            </div>
            <button class="tablero-card-edit-btn" onclick="event.preventDefault(); event.stopPropagation(); openTableroForm(${t.id})" title="Editar tablero">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
          </div>
        </div>
      </div>
    </a>
  `;
}

}

// Convierte la URL normal de Tableau Cloud a URL embed
function buildEmbedUrl(url) {
  if (!url) return '';

  // Transformar: #/site/xxx/ → /t/xxx/
  let embed = url.replace(/#\/site\//, '/t/');

  // Si el URL ya tiene parámetros (después de ?), agregar con &
  const separator = embed.includes('?') ? '&' : '?';
  // Solo agregar parámetros de embed si no los tiene ya
  if (!embed.includes(':embed=yes')) {
    embed += `${separator}:embed=yes&:showVizHome=no&:toolbar=no`;
  }
  return embed;
}

// Verifica el URL abriéndolo en nueva pestaña (ya que no usamos iframe)
function testTableroUrl() {
  const url = document.getElementById('tf-url').value.trim();
  const errorEl = document.getElementById('tf-error');

  errorEl.style.display = 'none';

  if (!url) {
    errorEl.textContent = 'Pega un URL para verificar';
    errorEl.style.display = 'block';
    return;
  }

  if (!url.includes('tableau.com')) {
    errorEl.textContent = 'El URL debe ser de Tableau Cloud (*.tableau.com)';
    errorEl.style.display = 'block';
    return;
  }

  // Abrir el URL en nueva pestaña para verificar que carga correctamente
  window.open(url, '_blank', 'noopener');
}

async function saveTablero(tableroId) {
  const titulo = document.getElementById('tf-titulo').value.trim();
  const descripcion = document.getElementById('tf-descripcion').value.trim();
  const categoria = document.getElementById('tf-categoria').value.trim() || 'General';
  const url = document.getElementById('tf-url').value.trim();
  const orden = parseInt(document.getElementById('tf-orden').value) || 0;
  const errorEl = document.getElementById('tf-error');

  errorEl.style.display = 'none';

  // Validaciones
  if (!titulo) {
    errorEl.textContent = 'El título es obligatorio';
    errorEl.style.display = 'block';
    return;
  }
  if (!url) {
    errorEl.textContent = 'El URL de Tableau es obligatorio';
    errorEl.style.display = 'block';
    return;
  }
  if (!url.includes('tableau.com')) {
    errorEl.textContent = 'El URL debe ser de Tableau Cloud (*.tableau.com)';
    errorEl.style.display = 'block';
    return;
  }

  const embedUrl = buildEmbedUrl(url);

  const payload = {
    titulo,
    descripcion: descripcion || null,
    categoria,
    tableau_url: url,
    embed_url: embedUrl,
    orden,
    visible: true
  };

  const saveBtn = document.querySelector('.tablero-btn-primary');
  saveBtn.disabled = true;
  saveBtn.textContent = 'Guardando...';

  try {
    if (tableroId) {
      // Update
      await supabaseRequest(`tableros?id=eq.${tableroId}`, {
        method: 'PATCH',
        headers: { 'Prefer': 'return=minimal' },
        body: JSON.stringify(payload)
      });
    } else {
      // Insert
      await supabaseRequest('tableros', {
        method: 'POST',
        headers: { 'Prefer': 'return=minimal' },
        body: JSON.stringify(payload)
      });
    }

    closeTableroForm();

    // Recargar tableros de Supabase y re-renderizar
    const tablerosRows = await supabaseRequest('tableros?select=*&visible=eq.true&order=orden.asc');
    state.tableros = Array.isArray(tablerosRows) ? tablerosRows : [];
    renderTableros();

    setSourceStatus('live', tableroId ? 'Tablero actualizado' : 'Tablero agregado');
  } catch (e) {
    console.error('Error guardando tablero:', e);
    errorEl.textContent = 'Error al guardar. Revisa la conexión con Supabase.';
    errorEl.style.display = 'block';
    saveBtn.disabled = false;
    saveBtn.textContent = tableroId ? 'Guardar cambios' : 'Agregar tablero';
  }
}

async function deleteTablero(tableroId) {
  if (!confirm('¿Estás seguro de eliminar este tablero? Esta acción no se puede deshacer.')) {
    return;
  }

  const deleteBtn = document.querySelector('.tablero-btn-delete');
  if (deleteBtn) {
    deleteBtn.disabled = true;
    deleteBtn.textContent = 'Eliminando...';
  }

  try {
    await supabaseRequest(`tableros?id=eq.${tableroId}`, {
      method: 'DELETE',
      headers: { 'Prefer': 'return=minimal' }
    });

    closeTableroForm();

    // Recargar tableros
    const tablerosRows = await supabaseRequest('tableros?select=*&visible=eq.true&order=orden.asc');
    state.tableros = Array.isArray(tablerosRows) ? tablerosRows : [];
    renderTableros();

    setSourceStatus('live', 'Tablero eliminado');
  } catch (e) {
    console.error('Error eliminando tablero:', e);
    alert('Error al eliminar. Revisa la conexión.');
    if (deleteBtn) {
      deleteBtn.disabled = false;
      deleteBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg> Eliminar';
    }
  }
}

/* ==========================================================
   KANBAN
========================================================== */
function renderKanban() {
  const data = filteredData();
  const board = document.getElementById('kanban-board');

  if (!data.length) {
    board.innerHTML = emptyState();
    return;
  }

  const grouped = {};
  data.forEach(d => {
    if (!d.fecha) return;
    const key = `${d.fecha.getFullYear()}-${String(d.fecha.getMonth()+1).padStart(2,'0')}`;
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(d);
  });

  const keys = Object.keys(grouped).sort();
  const now = new Date();
  const nowKey = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

  board.innerHTML = keys.map(k => {
    const [year, month] = k.split('-').map(Number);
    const tasks = grouped[k].sort((a,b) => a.fecha - b.fecha);
    const monthName = MES_LARGO[month-1];
    const isCurrent = k === nowKey;

    return `
      <div class="kanban-column">
        <div class="kanban-header ${isCurrent ? 'current' : ''}">
          <div class="kanban-title">${monthName} <span class="year-tag">'${String(year).slice(-2)}</span></div>
          <div class="kanban-count">${tasks.length}</div>
        </div>
        <div class="kanban-cards">
          ${tasks.map(t => {
            const estado = t.estado.toLowerCase().replace(/\s+/g, '-');
            const isOverdue = t.fecha < now && estado !== 'finalizado';
            const idx = state.data.indexOf(t);
            return `
              <div class="kanban-card" data-idx="${idx}">
                <div class="card-frente">${t.frente}</div>
                <div class="card-title">${t.actividad}</div>
                <div class="card-footer">
                  <span class="card-date ${isOverdue ? 'overdue' : ''}">${t.fechaStr}</span>
                  <span class="status-chip status-${estado}" style="font-size:10px; padding:2px 7px">${t.estado}</span>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;
  }).join('');

  board.querySelectorAll('.kanban-card').forEach(card => {
    card.addEventListener('click', () => {
      const idx = parseInt(card.dataset.idx);
      openDrawer(state.data[idx]);
    });
  });
}

function openDrawer(task) {
  const drawer = document.getElementById('drawer');
  const backdrop = document.getElementById('drawer-backdrop');
  const body = document.getElementById('drawer-body');
  const badges = document.getElementById('drawer-badges');

  const estadoClass = 'status-' + task.estado.toLowerCase().replace(/\s+/g, '-');
  const now = new Date();
  const isOverdue = task.fecha && task.fecha < now && task.estado.toLowerCase() !== 'finalizado';

  badges.innerHTML = `
    <span class="drawer-badge">${task.frente}</span>
    <span class="status-chip ${estadoClass}">${task.estado}</span>
    ${isOverdue ? '<span class="status-chip status-vencida">Vencida</span>' : ''}
  `;

  const estados = ['Pendiente', 'En proceso', 'Agendado', 'Finalizado'];
  const canEdit = USE_SUPABASE && task.id;

  body.innerHTML = `
    <div class="drawer-project">${task.proyecto}</div>
    <h2 class="drawer-title">${escapeHtml(task.actividad)}</h2>

    ${canEdit ? `
      <div class="drawer-section">
        <div class="drawer-section-label">Estado</div>
        <div class="estado-buttons">
          ${estados.map(e => `
            <button class="estado-btn ${task.estado === e ? 'active status-' + e.toLowerCase().replace(/\s+/g, '-') : ''}"
                    data-estado="${e}">
              ${e}
            </button>
          `).join('')}

    <div class="drawer-meta">
      <div>
        <div class="meta-field-label">Fecha cierre</div>
        ${canEdit ? `
          <input type="date" class="meta-field-input" id="drawer-fecha-input" value="${task.fecha ? task.fecha.toISOString().slice(0,10) : ''}">
        ` : `
          <div class="meta-field-value">${task.fechaStr || '—'}</div>
        `}
      </div>
      <div>
        <div class="meta-field-label">Responsable</div>
        ${canEdit ? `
          <input type="text" class="meta-field-input" id="drawer-resp-input" list="drawer-resp-datalist" value="${escapeHtml(task.responsable || '')}" placeholder="Sin asignar">
          <datalist id="drawer-resp-datalist">
            ${[...new Set(state.data.map(d => d.responsable).filter(Boolean))].sort().map(r => `<option value="${escapeHtml(r)}">`).join('')}
          </datalist>
        ` : `
          <div class="meta-field-value">${task.responsable || '—'}</div>
        `}
      </div>
    </div>

    <div class="drawer-notes-label">Notas</div>
    ${canEdit ? `
      <textarea class="drawer-notes-edit" id="drawer-notes-textarea" placeholder="Agrega notas…">${escapeHtml(task.notas || '')}</textarea>
      <div class="drawer-notes-footer">

        <button class="drawer-notes-save" id="drawer-notes-save" disabled>Guardar notas</button>

    ` : `
      ${task.notas ? `<div class="drawer-notes">${escapeHtml(task.notas)}</div>` : '<div class="drawer-notes-empty">Sin notas</div>'}
    `}

    ${task.id ? `

        </div>
      </div>

  `;

  // Cargar historial de cambios
  if (task.id && USE_SUPABASE) {

  }

  // Bindear botones de estado
  if (canEdit) {
    body.querySelectorAll('.estado-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const nuevo = btn.dataset.estado;

        // Update visual inmediato de los botones (optimista)
        body.querySelectorAll('.estado-btn').forEach(b => {

        // Update del state y de los badges del drawer
        task.estado = nuevo;
        refreshDrawerBadges(task);

        // Guardar en Supabase
        await updateActividad(task.id, { estado: nuevo });

        // Recargar historial
        if (task.id) loadHistorial(task.id);
      });
    });

    // Bindear textarea
    const textarea = document.getElementById('drawer-notes-textarea');
    const saveBtn = document.getElementById('drawer-notes-save');
    const hint = document.getElementById('drawer-notes-hint');
    const originalNotas = task.notas || '';

    textarea.addEventListener('input', () => {
      const changed = textarea.value !== originalNotas;
      saveBtn.disabled = !changed;
      if (changed) {
        hint.textContent = 'Cambios sin guardar';
        hint.style.color = 'var(--state-progress)';
      } else {
        hint.textContent = 'Cmd/Ctrl+Enter para guardar';
        hint.style.color = 'var(--text-faint)';
      }
    });

    textarea.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
        e.preventDefault();
        if (!saveBtn.disabled) saveBtn.click();
      }
    });

    saveBtn.addEventListener('click', async () => {
      saveBtn.disabled = true;
      saveBtn.textContent = 'Guardando…';
      await updateActividad(task.id, { notas: textarea.value });
      saveBtn.textContent = 'Guardado ✓';
      hint.textContent = 'Notas actualizadas';
      hint.style.color = 'var(--state-done)';
      setTimeout(() => {
        saveBtn.textContent = 'Guardar notas';
        hint.textContent = 'Cmd/Ctrl+Enter para guardar';
        hint.style.color = 'var(--text-faint)';
      }, 2000);
    });

    // Bindear input de fecha
    const fechaInput = document.getElementById('drawer-fecha-input');
    if (fechaInput) {
      fechaInput.addEventListener('change', async () => {
        const nuevoIso = fechaInput.value;
        if (!nuevoIso) return;

        // Convertir a formato "15 junio" o "15 junio 2026"
        const [yyyy, mm, dd] = nuevoIso.split('-').map(Number);
        const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
        const nuevoStr = `${dd} ${meses[mm-1]}${yyyy !== 2026 ? ' ' + yyyy : ''}`;

        // Feedback visual instantáneo
        const originalBorder = fechaInput.style.borderColor;
        fechaInput.style.borderColor = 'var(--state-progress)';

        // Actualizar task local
        task.fechaStr = nuevoStr;
        task.fecha = new Date(nuevoIso + 'T12:00:00');
        refreshDrawerBadges(task);

        try {
          await updateActividad(task.id, {
            fechaStr: nuevoStr,
            fecha: new Date(nuevoIso + 'T12:00:00')
          });

          // Feedback visual éxito
          fechaInput.style.borderColor = 'var(--state-done)';
          fechaInput.style.boxShadow = '0 0 0 3px rgba(22, 163, 74, 0.15)';
          setTimeout(() => {
            fechaInput.style.borderColor = '';
            fechaInput.style.boxShadow = '';
          }, 1200);

          // Recargar historial
          if (task.id) loadHistorial(task.id);
        } catch (e) {
          fechaInput.style.borderColor = 'var(--state-overdue)';
          setTimeout(() => { fechaInput.style.borderColor = ''; }, 2000);
        }
      });
    }

    // Bindear input de responsable
    const respInput = document.getElementById('drawer-resp-input');
    if (respInput) {
      let ultimoValor = task.responsable || '';
      let guardando = false;

      const guardarResp = async () => {
        if (guardando) return;
        const nuevo = respInput.value.trim();
        if (nuevo === ultimoValor) return;

        guardando = true;
        const originalBorder = respInput.style.borderColor;
        respInput.style.borderColor = 'var(--state-progress)';

        try {
          await updateActividad(task.id, { responsable: nuevo });
          ultimoValor = nuevo;
          task.responsable = nuevo;

          // Feedback visual de éxito
          respInput.style.borderColor = 'var(--state-done)';
          respInput.style.boxShadow = '0 0 0 3px rgba(22, 163, 74, 0.15)';
          setTimeout(() => {
            respInput.style.borderColor = '';
            respInput.style.boxShadow = '';
          }, 1200);

          // Recargar historial
          if (task.id) loadHistorial(task.id);
        } catch (e) {
          respInput.style.borderColor = 'var(--state-overdue)';
          console.error('Error guardando responsable:', e);
          setTimeout(() => { respInput.style.borderColor = ''; }, 2000);
        } finally {
          guardando = false;
        }
      };

      // Evento change: dispara al seleccionar del autocompletado
      respInput.addEventListener('change', guardarResp);

      // Evento blur: dispara al salir del campo (click fuera, Tab, etc.)
      respInput.addEventListener('blur', guardarResp);

      // Enter: fuerza el blur para guardar
      respInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          respInput.blur();
        }
      });
    }
  }

  drawer.classList.add('open');
  backdrop.classList.add('open');
}

async function loadHistorial(actividadId) {
  const list = document.getElementById('drawer-history-list');
  if (!list) return;

  try {
    const logs = await supabaseRequest(
      `actividad_log?actividad_id=eq.${actividadId}&order=created_at.desc&limit=15`
    );

    if (!logs || logs.length === 0) {
      list.innerHTML = '<div class="drawer-history-empty">Aún no hay cambios registrados</div>';
      return;
    }

    list.innerHTML = logs.map(log => {
      const time = formatRelativeTime(new Date(log.created_at));
      const icon = historyIcon(log.campo);
      const text = historyText(log);
      return `
        <div class="drawer-history-item">
          <div class="drawer-history-icon ${log.campo}">${icon}</div>
          <div class="drawer-history-text">${text}</div>
          <div class="drawer-history-time">${time}</div>
        </div>
      `;
    }).join('');
  } catch (e) {
    console.error('Error cargando historial:', e);
    list.innerHTML = '<div class="drawer-history-empty">Error al cargar historial</div>';
  }
}

function historyIcon(campo) {
  const icons = {
    'estado': '●',
    'fecha_cierre': '📅',
    'responsable': '👤',
    'notas': '📝',
    'frente': '🏷',
    'created': '✨'
  };
  return icons[campo] || '•';
}

function historyText(log) {
  const campo = log.campo;
  const viejo = log.valor_anterior ? escapeHtml(log.valor_anterior) : '—';
  const nuevo = log.valor_nuevo ? escapeHtml(log.valor_nuevo) : '—';

  if (campo === 'created') {
    return `<strong>Creada</strong> con estado <span class="new">${nuevo}</span>`;
  }
  if (campo === 'notas') {
    // Las notas las mostramos más compactas
    const viejoShort = log.valor_anterior ? (log.valor_anterior.length > 30 ? log.valor_anterior.substring(0, 30) + '…' : log.valor_anterior) : '';
    const nuevoShort = log.valor_nuevo ? (log.valor_nuevo.length > 30 ? log.valor_nuevo.substring(0, 30) + '…' : log.valor_nuevo) : '';
    if (!viejoShort) return `<strong>Nota agregada:</strong> <span class="new">${escapeHtml(nuevoShort)}</span>`;
    if (!nuevoShort) return `<strong>Nota eliminada</strong>`;
    return `<strong>Nota actualizada</strong>`;
  }

  const labels = {
    'estado': 'Estado',
    'fecha_cierre': 'Fecha',
    'responsable': 'Responsable',
    'frente': 'Frente'
  };
  const label = labels[campo] || campo;

  return `<strong>${label}:</strong> <span class="old">${viejo}</span> → <span class="new">${nuevo}</span>`;
}

function formatRelativeTime(date) {
  const now = new Date();
  const diff = (now - date) / 1000; // en segundos

  if (diff < 60) return 'hace unos segundos';
  if (diff < 3600) return `hace ${Math.round(diff/60)} min`;
  if (diff < 86400) return `hace ${Math.round(diff/3600)} h`;
  if (diff < 604800) return `hace ${Math.round(diff/86400)} días`;

  // Más de una semana: mostrar fecha
  return date.toLocaleDateString('es', { day: 'numeric', month: 'short' });
}

function escapeHtml(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-backdrop').classList.remove('open');
}

// Actualiza los badges del drawer (estado, vencida) sin reconstruir todo el drawer
function refreshDrawerBadges(task) {
  const badges = document.getElementById('drawer-badges');
  if (!badges) return;

  const estadoClass = 'status-' + task.estado.toLowerCase().replace(/\s+/g, '-');
  const now = new Date();
  const isOverdue = task.fecha && task.fecha < now && task.estado.toLowerCase() !== 'finalizado';

  badges.innerHTML = `
    <span class="drawer-badge">${escapeHtml(task.frente)}</span>
    <span class="status-chip ${estadoClass}">${escapeHtml(task.estado)}</span>
    ${isOverdue ? '<span class="status-chip status-vencida">Vencida</span>' : ''}
  `;
}

/* ============================================================
   NUEVA ACTIVIDAD
============================================================ */
function openNewActivityDrawer() {
  const drawer = document.getElementById('drawer');
  const backdrop = document.getElementById('drawer-backdrop');
  const body = document.getElementById('drawer-body');
  const badges = document.getElementById('drawer-badges');

  // Extraer valores únicos existentes para datalists (autocompletado)
  const frentesUnicos = [...new Set(state.data.map(d => d.frente).filter(Boolean))].sort();
  const proyectosUnicos = [...new Set(state.data.map(d => d.proyecto).filter(Boolean))].sort();
  const responsablesUnicos = [...new Set(state.data.map(d => d.responsable).filter(Boolean))].sort();

  badges.innerHTML = `
    <span class="drawer-badge" style="background:rgba(22, 163, 74, 0.25); border-color:rgba(22, 163, 74, 0.4)">
      Nueva actividad
    </span>
  `;

  body.innerHTML = `
    <h2 class="drawer-title" style="margin-bottom: 1.5rem;">Agregar actividad al plan</h2>

    <div class="form-error" id="form-error"></div>

    <div class="new-activity-form">

      <div class="form-field">
        <label class="form-label" for="field-actividad">Actividad<span class="required">*</span></label>
        <textarea class="form-textarea" id="field-actividad"
                  placeholder="Describe la actividad (ej. Lanzar campaña de reactivación SMS)"
                  autofocus></textarea>
      </div>

      <div class="form-field-row">
        <div class="form-field">
          <label class="form-label" for="field-frente">Frente<span class="required">*</span></label>
          <input class="form-input" id="field-frente" list="datalist-frentes"
                 placeholder="ej. Growth" autocomplete="off">
          <datalist id="datalist-frentes">
            ${frentesUnicos.map(f => `<option value="${escapeHtml(f)}">`).join('')}
          </datalist>
        </div>

        <div class="form-field">
          <label class="form-label" for="field-proyecto">Proyecto<span class="required">*</span></label>
          <input class="form-input" id="field-proyecto" list="datalist-proyectos"
                 placeholder="ej. Reactivación Q2" autocomplete="off">
          <datalist id="datalist-proyectos">
            ${proyectosUnicos.map(p => `<option value="${escapeHtml(p)}">`).join('')}
          </datalist>
        </div>
      </div>

      <div class="form-field-row">
        <div class="form-field">
          <label class="form-label" for="field-fecha">Fecha cierre<span class="required">*</span></label>
          <input class="form-input" id="field-fecha" type="date">
          <span class="form-hint">Fecha objetivo de cierre</span>
        </div>

        <div class="form-field">
          <label class="form-label" for="field-responsable">Responsable</label>
          <input class="form-input" id="field-responsable" list="datalist-responsables"
                 placeholder="ej. Nicolás" autocomplete="off">
          <datalist id="datalist-responsables">
            ${responsablesUnicos.map(r => `<option value="${escapeHtml(r)}">`).join('')}
          </datalist>
        </div>
      </div>

      <div class="form-field">
        <label class="form-label" for="field-estado">Estado inicial</label>
        <select class="form-select" id="field-estado">
          <option value="Pendiente">Pendiente</option>
          <option value="En proceso">En proceso</option>
          <option value="Agendado">Agendado</option>
          <option value="Finalizado">Finalizado</option>
        </select>
      </div>

      <div class="form-field">
        <label class="form-label" for="field-notas">Notas</label>
        <textarea class="form-textarea" id="field-notas"
                  placeholder="Contexto, enlaces, observaciones…"></textarea>
      </div>

      <div class="form-actions">
        <button class="btn-secondary" onclick="closeDrawer()">Cancelar</button>
        <button class="btn-primary" id="btn-save-activity" onclick="saveNewActivity()">
          Crear actividad
        </button>
      </div>

    </div>
  `;

  drawer.classList.add('open');
  backdrop.classList.add('open');

  // Preseleccionar fecha = hoy + 7 días
  const defaultDate = new Date();
  defaultDate.setDate(defaultDate.getDate() + 7);
  const yyyy = defaultDate.getFullYear();
  const mm = String(defaultDate.getMonth()+1).padStart(2, '0');
  const dd = String(defaultDate.getDate()).padStart(2, '0');
  document.getElementById('field-fecha').value = `${yyyy}-${mm}-${dd}`;

  // Atajo Ctrl/Cmd+Enter para guardar
  body.querySelectorAll('input, textarea, select').forEach(el => {
    el.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
        e.preventDefault();
        saveNewActivity();
      }
    });
  });

  // Auto-focus
  setTimeout(() => document.getElementById('field-actividad')?.focus(), 100);
}

async function saveNewActivity() {
  const errorEl = document.getElementById('form-error');
  const saveBtn = document.getElementById('btn-save-activity');

  const actividad = document.getElementById('field-actividad').value.trim();
  const frente = document.getElementById('field-frente').value.trim();
  const proyecto = document.getElementById('field-proyecto').value.trim();
  const fechaIso = document.getElementById('field-fecha').value;
  const responsable = document.getElementById('field-responsable').value.trim();
  const estado = document.getElementById('field-estado').value;
  const notas = document.getElementById('field-notas').value.trim();

  // Validación
  const errores = [];
  if (!actividad) errores.push('Descripción de la actividad');
  if (!frente) errores.push('Frente');
  if (!proyecto) errores.push('Proyecto');
  if (!fechaIso) errores.push('Fecha cierre');

  if (errores.length > 0) {
    errorEl.textContent = 'Falta completar: ' + errores.join(', ');
    errorEl.classList.add('visible');
    return;
  }
  errorEl.classList.remove('visible');

  // Construir fecha string estilo "15 junio"
  const [yyyy, mm, dd] = fechaIso.split('-').map(Number);
  const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const fechaStr = `${dd} ${meses[mm-1]}${yyyy !== 2026 ? ' ' + yyyy : ''}`;

  saveBtn.disabled = true;
  saveBtn.textContent = 'Guardando…';

  try {
    const payload = {
      frente,
      proyecto,
      actividad,
      fecha_cierre: fechaIso,
      fecha_cierre_str: fechaStr,
      responsable: responsable || null,
      estado,
      notas: notas || null,
      origen: 'dashboard'
    };

    const result = await supabaseRequest('actividades', {
      method: 'POST',
      headers: { 'Prefer': 'return=representation' },
      body: JSON.stringify(payload)
    });

    // result es un array con la nueva fila
    const newId = result && result[0] ? result[0].id : null;

    saveBtn.textContent = 'Creada ✓';
    setSourceStatus('live', 'Actividad creada');

    // Recargar datos desde Supabase y abrir la nueva
    await loadFromSupabase();

    setTimeout(() => {
      const newTask = state.data.find(t => t.id === newId);
      if (newTask) {
        openDrawer(newTask);
      } else {
        closeDrawer();
      }
    }, 400);

  } catch (e) {
    console.error('Error creando actividad:', e);
    errorEl.textContent = 'Error al guardar: ' + e.message;
    errorEl.classList.add('visible');
    saveBtn.disabled = false;
    saveBtn.textContent = 'Crear actividad';
    setSourceStatus('error', 'Error al guardar');
  }
}

function emptyState() {
  return `
    <div class="empty-state">
      <div class="empty-state-icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      </div>
      <div class="empty-title">Sin resultados</div>
      <div class="empty-sub">Ajusta los filtros o la búsqueda</div>
    </div>
  `;
}

// Re-render al cambiar tamaño de ventana (debounced)
let resizeTimeout = null;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimeout);
  resizeTimeout = setTimeout(() => {
    // Solo re-renderizar vistas que dependen del ancho (Gantt principalmente)
    if (state.view === 'gantt' || state.view === 'metrics') {
      renderAll();
    }
  }, 200);
});

init();
