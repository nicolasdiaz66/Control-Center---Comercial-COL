<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control Center - C&E COL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ==========================================================
   GLOBAL66 — Brandbook
   #1F49B6 royal · #203478 deep · blanco · #303030 texto
========================================================== */
:root {
  --royal: #1F49B6;
  --royal-hover: #1A3FA0;
  --royal-10: rgba(31, 73, 182, 0.10);
  --royal-08: rgba(31, 73, 182, 0.08);
  --royal-04: rgba(31, 73, 182, 0.04);

  --deep: #203478;
  --deep-hover: #1A2B64;
  --deep-darker: #141F4D;
  --deep-deepest: #0A1029;

  /* Tintes sobre oscuro */
  --on-deep: #FFFFFF;
  --on-deep-soft: rgba(255, 255, 255, 0.82);
  --on-deep-dim: rgba(255, 255, 255, 0.60);
  --on-deep-faint: rgba(255, 255, 255, 0.42);

  /* Texto claro */
  --text: #303030;
  --text-strong: #1A1A1A;
  --text-dim: #6B6B6B;
  --text-faint: #9E9E9E;

  /* Neutros */
  --bg: #FFFFFF;
  --bg-subtle: #FAFBFC;
  --surface: #FFFFFF;
  --border: #ECEEF2;
  --border-strong: #D8DCE3;

  /* Estados - colores semánticos */
  --state-done: #16A34A;       /* verde - finalizado */
  --state-progress: #F59E0B;   /* ámbar - en proceso */
  --state-pending: #EAB308;    /* amarillo - pendiente */
  --state-scheduled: #1F49B6;  /* azul - agendado */
  --state-overdue: #DC2626;    /* rojo - vencida */

  /* Tintes de estado (backgrounds suaves) */
  --state-done-bg: rgba(22, 163, 74, 0.12);
  --state-progress-bg: rgba(245, 158, 11, 0.14);
  --state-pending-bg: rgba(234, 179, 8, 0.14);
  --state-scheduled-bg: rgba(31, 73, 182, 0.12);
  --state-overdue-bg: rgba(220, 38, 38, 0.12);

  /* Shadows */
  --shadow-xs: 0 1px 2px rgba(32, 52, 120, 0.04);
  --shadow-sm: 0 2px 4px rgba(32, 52, 120, 0.06);
  --shadow-md: 0 4px 12px rgba(32, 52, 120, 0.08);
  --shadow-lg: 0 12px 32px rgba(32, 52, 120, 0.14);
  --shadow-xl: 0 24px 56px rgba(32, 52, 120, 0.20);

  /* Layout */
  --sidebar-w: clamp(240px, 18vw, 280px);
  --topbar-h: 68px;
  --label-col-w: clamp(260px, 22vw, 360px);
  --radius-sm: 6px;
  --radius: 10px;
  --radius-lg: 14px;

  --ease: cubic-bezier(0.16, 1, 0.3, 1);
  --duration: 0.2s;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-weight: 500;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-size: 14px;
  line-height: 1.5;
}

button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
button:focus-visible { outline: 2px solid var(--royal); outline-offset: 2px; border-radius: 4px; }
input { font-family: inherit; }

/* ==========================================================
   APP
========================================================== */
.app {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  grid-template-rows: var(--topbar-h) 1fr;
  height: 100vh;
  grid-template-areas:
    "sidebar topbar"
    "sidebar main";
}

/* ==========================================================
   SIDEBAR — Azul oscuro con KV de Global66
========================================================== */
.sidebar {
  grid-area: sidebar;
  background: var(--deep-darker);
  color: var(--on-deep);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

/* Haz de luz diagonal como el KV del slide 3 */
.sidebar::before {
  content: "";
  position: absolute;
  top: -20%;
  left: -10%;
  right: -10%;
  height: 70%;
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%, rgba(31, 73, 182, 0.45) 0%, transparent 70%),
    linear-gradient(160deg, rgba(31, 73, 182, 0.3) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

.sidebar > * { position: relative; z-index: 1; }

.sidebar-header {
  padding: 1.35rem 1.25rem 1rem;
  display: flex;
  align-items: center;
  gap: 0.7rem;
  border-bottom: 1px solid rgba(255, 255, 255, 0.08);
}

.brand-mark {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--royal);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 4px 12px rgba(31, 73, 182, 0.5);
}

.brand-mark svg { width: 20px; height: 9px; }

.brand-wordmark {
  display: flex;
  flex-direction: column;
  line-height: 1.15;
}

.brand-name {
  font-size: 16px;
  font-weight: 700;
  color: var(--on-deep);
  letter-spacing: -0.02em;
}

.brand-tag {
  font-size: 10px;
  color: var(--on-deep-dim);
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-top: 2px;
}

.sidebar-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 0.85rem 0.75rem 1.25rem;
}

.sidebar-scroll::-webkit-scrollbar { width: 4px; }
.sidebar-scroll::-webkit-scrollbar-track { background: transparent; }
.sidebar-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }
.sidebar-scroll::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.22); }

/* Botón Mi Semana destacado */
.sidebar-home-btn {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 0.65rem;
  padding: 0.75rem 0.85rem;
  border-radius: 10px;
  cursor: pointer;
  transition: all var(--duration) var(--ease);
  color: var(--on-deep);
  font-size: 14px;
  font-weight: 700;
  user-select: none;
  background: linear-gradient(135deg, rgba(31, 73, 182, 0.25) 0%, rgba(31, 73, 182, 0.1) 100%);
  border: 1px solid rgba(143, 177, 255, 0.25);
  margin-bottom: 0.35rem;
  letter-spacing: -0.01em;
  position: relative;
  overflow: hidden;
  font-family: inherit;
}

.sidebar-home-btn::before {
  content: "";
  position: absolute;
  top: -50%;
  right: -20%;
  width: 60%;
  height: 200%;
  background: radial-gradient(ellipse at center, rgba(143, 177, 255, 0.15) 0%, transparent 70%);
  pointer-events: none;
}

.sidebar-home-btn > * { position: relative; z-index: 1; }

.sidebar-home-btn:hover {
  background: linear-gradient(135deg, rgba(31, 73, 182, 0.4) 0%, rgba(31, 73, 182, 0.2) 100%);
  border-color: rgba(143, 177, 255, 0.5);
  transform: translateY(-1px);
}

.sidebar-home-btn.active {
  background: var(--royal);
  border-color: var(--royal);
  box-shadow: 0 4px 14px rgba(31, 73, 182, 0.5);
}

.sidebar-home-btn.active::before {
  background: radial-gradient(ellipse at center, rgba(255, 255, 255, 0.18) 0%, transparent 65%);
}

.sidebar-home-btn > svg:first-of-type {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
  color: #FFFFFF;
}

.sidebar-home-btn > span {
  flex: 1;
  text-align: left;
}

.sidebar-home-arrow {
  width: 14px;
  height: 14px;
  opacity: 0.6;
  transition: transform var(--duration);
  flex-shrink: 0;
}

.sidebar-home-btn:hover .sidebar-home-arrow {
  opacity: 1;
  transform: translateX(2px);
}

.sidebar-home-btn.active .sidebar-home-arrow {
  opacity: 0.9;
}

.sidebar-divider-line {
  height: 1px;
  background: rgba(255, 255, 255, 0.08);
  margin: 0.9rem 0.35rem 0.85rem;
}

/* Quick filters */
.quick-filter {
  display: flex;
  align-items: center;
  gap: 0.65rem;
  padding: 0.55rem 0.75rem;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--duration) var(--ease);
  color: var(--on-deep-soft);
  font-size: 13px;
  font-weight: 600;
  user-select: none;
  margin-bottom: 2px;
}

.quick-filter:hover {
  background: rgba(255, 255, 255, 0.08);
  color: var(--on-deep);
}

.quick-filter.active {
  background: var(--royal);
  color: #FFFFFF;
  box-shadow: 0 4px 12px rgba(31, 73, 182, 0.4);
}

.quick-filter.active .qf-count {
  background: rgba(255, 255, 255, 0.22);
  color: #FFFFFF;
}

.quick-filter svg { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.85; }
.quick-filter.active svg { opacity: 1; }

.qf-name { flex: 1; }

.qf-count {
  font-size: 11px;
  font-weight: 700;
  background: rgba(255, 255, 255, 0.1);
  color: var(--on-deep-dim);
  padding: 2px 8px;
  border-radius: 10px;
  min-width: 24px;
  text-align: center;
}

.quick-filter:hover .qf-count { background: rgba(255, 255, 255, 0.18); color: var(--on-deep); }

/* Sidebar sections */
.sidebar-section {
  margin-top: 1.25rem;
  margin-bottom: 0.35rem;
  padding: 0 0.75rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  user-select: none;
  height: 34px;
  border-radius: var(--radius-sm);
  transition: background var(--duration);
}

.sidebar-section:hover { background: rgba(255, 255, 255, 0.05); }

.sidebar-section-title {
  font-size: 10.5px;
  font-weight: 700;
  color: var(--on-deep-faint);
  text-transform: uppercase;
  letter-spacing: 0.12em;
}

.sidebar-section-count {
  font-size: 11px;
  color: var(--on-deep-dim);
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 0.4rem;
}

.sidebar-section-count.has-active { color: #8FB1FF; }

.sidebar-chevron {
  width: 11px;
  height: 11px;
  transition: transform 0.2s var(--ease);
  color: var(--on-deep-faint);
}

.sidebar-section.collapsed .sidebar-chevron { transform: rotate(-90deg); }

.sidebar-body {
  overflow: hidden;
  max-height: 1500px;
  transition: max-height 0.3s var(--ease);
}

.sidebar-section.collapsed + .sidebar-body { max-height: 0; }

.filter-item {
  display: flex;
  align-items: center;
  gap: 0.55rem;
  padding: 0.42rem 0.75rem;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background var(--duration) var(--ease);
  color: var(--on-deep-soft);
  font-size: 12.5px;
  font-weight: 500;
  user-select: none;
  margin-bottom: 1px;
}

.filter-item:hover {
  background: rgba(255, 255, 255, 0.06);
  color: var(--on-deep);
}

.filter-item.active {
  background: rgba(31, 73, 182, 0.4);
  color: #FFFFFF;
  font-weight: 700;
}

.filter-check {
  width: 14px;
  height: 14px;
  border: 1.5px solid rgba(255, 255, 255, 0.25);
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all var(--duration);
}

.filter-item:hover .filter-check { border-color: rgba(255, 255, 255, 0.5); }

.filter-item.active .filter-check {
  background: var(--royal);
  border-color: var(--royal);
}

.filter-item.active .filter-check::after {
  content: "";
  width: 4px;
  height: 7px;
  border-right: 1.5px solid #FFFFFF;
  border-bottom: 1.5px solid #FFFFFF;
  transform: rotate(45deg);
  margin-top: -1px;
}

.filter-name {
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.filter-count {
  font-size: 11px;
  color: var(--on-deep-faint);
  font-weight: 600;
}

.filter-item.active .filter-count { color: var(--on-deep); }

/* Reset button */
.sidebar-reset {
  margin: 1.1rem 0.25rem 0;
  padding: 0.6rem 0.75rem;
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid rgba(255, 255, 255, 0.15);
  border-radius: var(--radius-sm);
  font-size: 12px;
  color: var(--on-deep-soft);
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.45rem;
  transition: all var(--duration);
  width: calc(100% - 0.5rem);
}

.sidebar-reset:hover {
  background: var(--royal);
  border-color: var(--royal);
  color: #FFFFFF;
}

.sidebar-reset svg { width: 13px; height: 13px; }

/* ==========================================================
   TOPBAR
========================================================== */
.topbar {
  grid-area: topbar;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 2rem;
  gap: 1.75rem;
  z-index: 10;
}

.title-block {
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.title-main {
  font-size: 19px;
  font-weight: 700;
  color: var(--deep);
  letter-spacing: -0.02em;
  line-height: 1.1;
}

.title-sub {
  font-size: 11px;
  color: var(--text-faint);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  font-weight: 600;
}

.topbar-spacer { flex: 1; }

.search-box {
  position: relative;
  width: 340px;
}

.search-box input {
  width: 100%;
  height: 40px;
  padding: 0 2.5rem 0 2.5rem;
  background: var(--bg-subtle);
  border: 1.5px solid transparent;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  transition: all var(--duration) var(--ease);
}

.search-box input::placeholder { color: var(--text-faint); font-weight: 500; }

.search-box input:focus {
  outline: none;
  background: var(--bg);
  border-color: var(--royal);
  box-shadow: 0 0 0 4px var(--royal-08);
}

.search-icon {
  position: absolute;
  left: 0.9rem;
  top: 50%;
  transform: translateY(-50%);
  width: 16px;
  height: 16px;
  color: var(--text-faint);
  pointer-events: none;
}

.search-shortcut {
  position: absolute;
  right: 0.65rem;
  top: 50%;
  transform: translateY(-50%);
  font-size: 10.5px;
  color: var(--text-faint);
  font-weight: 600;
  border: 1px solid var(--border-strong);
  border-radius: 4px;
  padding: 2px 6px;
  pointer-events: none;
  background: var(--bg);
}

.search-box.has-value .search-shortcut { display: none; }

.search-clear {
  position: absolute;
  right: 0.55rem;
  top: 50%;
  transform: translateY(-50%);
  width: 22px;
  height: 22px;
  border-radius: 50%;
  display: none;
  align-items: center;
  justify-content: center;
  color: var(--text-faint);
  transition: all var(--duration);
  font-size: 13px;
}

.search-clear:hover { background: #F0F2F5; color: var(--text); }
.search-box.has-value .search-clear { display: flex; }

.view-tabs {
  display: flex;
  background: var(--bg-subtle);
  padding: 3px;
  border-radius: var(--radius);
  gap: 2px;
}

.view-tab {
  padding: 0.5rem 1rem;
  font-size: 12.5px;
  font-weight: 600;
  color: var(--text-dim);
  border-radius: 7px;
  display: flex;
  align-items: center;
  gap: 0.45rem;
  transition: all var(--duration) var(--ease);
}

.view-tab:hover { color: var(--deep); }

.view-tab.active {
  background: var(--bg);
  color: var(--royal);
  box-shadow: var(--shadow-xs);
}

.view-tab svg { width: 15px; height: 15px; }

/* Botón Nueva Actividad */
.btn-new-activity {
  display: flex;
  align-items: center;
  gap: 0.45rem;
  padding: 0.6rem 1rem;
  background: var(--royal);
  color: #FFFFFF;
  border: none;
  border-radius: var(--radius);
  font-size: 12.5px;
  font-weight: 700;
  cursor: pointer;
  transition: all var(--duration) var(--ease);
  font-family: inherit;
  box-shadow: 0 2px 8px rgba(31, 73, 182, 0.25);
  margin-left: 0.5rem;
}

.btn-new-activity:hover {
  background: var(--royal-hover);
  transform: translateY(-1px);
  box-shadow: 0 4px 14px rgba(31, 73, 182, 0.35);
}

.btn-new-activity svg { width: 15px; height: 15px; }

/* ==========================================================
   MAIN
========================================================== */
.main {
  grid-area: main;
  overflow: hidden;
  background: var(--bg-subtle);
  position: relative;
  display: flex;
  flex-direction: column;
}

/* Responsive: pantallas chicas, sidebar más compacto */
@media (max-width: 900px) {
  :root {
    --sidebar-w: 56px;
    --label-col-w: 220px;
  }

  .sidebar-home-btn > span,
  .sidebar-home-arrow,
  .brand-wordmark,
  .quick-filter span:not(.quick-filter-count),
  .filter-name,
  .sidebar-section-title {
    display: none;
  }

  .sidebar {
    padding: 0.5rem 0.25rem;
  }

  .title-main {
    font-size: 16px;
  }

  .stat-card {
    min-width: 120px;
  }
}

/* Pantallas muy grandes: permitir que el contenido respire mejor */
@media (min-width: 1600px) {
  :root {
    --label-col-w: 400px;
  }
}

/* ==========================================================
   STATS HERO — Azul oscuro con luz como KV Global66
========================================================== */
.stats-hero {
  background: var(--deep-darker);
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}

/* Efecto KV: haz de luz + gradiente */
.stats-hero::before {
  content: "";
  position: absolute;
  top: -20%;
  right: -5%;
  width: 70%;
  height: 250%;
  background:
    radial-gradient(ellipse 60% 40% at 60% 20%, rgba(31, 73, 182, 0.5) 0%, transparent 60%);
  pointer-events: none;
}

.stats-hero::after {
  content: "";
  position: absolute;
  top: 0;
  right: 0;
  width: 50%;
  height: 100%;
  background: linear-gradient(110deg, transparent 30%, rgba(95, 136, 236, 0.12) 50%, transparent 70%);
  pointer-events: none;
}

.stats-strip {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  position: relative;
  z-index: 2;
}

.stat-card {
  padding: 1.35rem 1.5rem;
  border-right: 1px solid rgba(255, 255, 255, 0.08);
  position: relative;
  cursor: pointer;
  transition: background var(--duration);
}

.stat-card:last-child { border-right: none; }
.stat-card:hover { background: rgba(255, 255, 255, 0.04); }

.stat-card.primary::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: var(--stat-accent, var(--royal));
}

.stat-label {
  font-size: 10.5px;
  color: var(--on-deep-dim);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-weight: 700;
  margin-bottom: 0.55rem;
}

.stat-row {
  display: flex;
  align-items: baseline;
  gap: 0.6rem;
  margin-bottom: 4px;
}

.stat-value {
  font-size: 32px;
  font-weight: 700;
  color: var(--on-deep);
  line-height: 1;
  letter-spacing: -0.03em;
}

.stat-value .unit {
  font-size: 16px;
  color: var(--on-deep-dim);
  font-weight: 600;
  margin-left: 2px;
}

.stat-value.accent-royal { color: #8FB1FF; }
.stat-value.accent-warn {
  background: linear-gradient(180deg, #FFB800 0%, #FF9900 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.stat-delta {
  font-size: 11px;
  color: var(--on-deep-dim);
  font-weight: 600;
}

.stat-progress {
  height: 3px;
  background: rgba(255, 255, 255, 0.1);
  border-radius: 2px;
  margin-top: 0.75rem;
  overflow: hidden;
}

.stat-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--royal) 0%, #5F88EC 100%);
  border-radius: 2px;
  transition: width 0.6s var(--ease);
  box-shadow: 0 0 8px rgba(31, 73, 182, 0.5);
}

/* ==========================================================
   VIEW CONTAINER
========================================================== */
.view-container {
  flex: 1;
  overflow: auto;
  position: relative;
}

.view { display: none; min-height: 100%; }
.view.active { display: block; }

/* ==========================================================
   HOME VIEW - Mi semana
========================================================== */
.home-wrap {
  padding: 2rem clamp(1rem, 3vw, 2.5rem);
  max-width: 1800px;
  margin: 0 auto;
}

.home-hero {
  background: var(--deep-darker);
  border-radius: var(--radius-lg);
  padding: 2rem 2.25rem;
  color: var(--on-deep);
  position: relative;
  overflow: hidden;
  margin-bottom: 1.75rem;
  box-shadow: var(--shadow-lg);
}

.home-hero::before {
  content: "";
  position: absolute;
  top: -30%;
  right: -10%;
  width: 70%;
  height: 180%;
  background: radial-gradient(ellipse 60% 40% at 50% 50%, rgba(31, 73, 182, 0.5) 0%, transparent 65%);
  pointer-events: none;
}

.home-hero > * { position: relative; z-index: 1; }

.home-greeting {
  font-size: 13px;
  color: var(--on-deep-dim);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-weight: 700;
  margin-bottom: 0.5rem;
}

.home-title {
  font-size: 32px;
  font-weight: 800;
  letter-spacing: -0.03em;
  line-height: 1.1;
  margin-bottom: 0.75rem;
}

.home-status {
  font-size: 15px;
  color: var(--on-deep-soft);
  font-weight: 500;
  line-height: 1.5;
}

.home-status strong {
  color: var(--on-deep);
  font-weight: 700;
}

.home-status .status-pill {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 11.5px;
  font-weight: 700;
  margin: 0 4px;
  letter-spacing: 0.02em;
}

.home-status .status-pill.good {
  background: rgba(22, 163, 74, 0.22);
  color: #7EE3A7;
  border: 1px solid rgba(22, 163, 74, 0.4);
}

.home-status .status-pill.warn {
  background: rgba(245, 158, 11, 0.22);
  color: #FCD34D;
  border: 1px solid rgba(245, 158, 11, 0.4);
}

.home-status .status-pill.bad {
  background: rgba(220, 38, 38, 0.22);
  color: #FCA5A5;
  border: 1px solid rgba(220, 38, 38, 0.4);
}

/* Columnas - estilos por defecto (luego override en home-main-layout) */

.home-col {
  background: var(--bg);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  overflow: hidden;
  box-shadow: var(--shadow-xs);
  display: flex;
  flex-direction: column;
  min-height: 200px;
}

.home-col-header {
  padding: 1rem 1.15rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg-subtle);
}

.home-col-title {
  font-size: 12.5px;
  font-weight: 700;
  color: var(--deep);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.home-col-title .col-icon {
  width: 16px;
  height: 16px;
}

.home-col-count {
  font-size: 11.5px;
  font-weight: 700;
  background: var(--bg);
  color: var(--text-dim);
  padding: 3px 9px;
  border-radius: 10px;
  border: 1px solid var(--border);
}

.home-col.today .home-col-header { background: var(--royal); border-bottom-color: var(--royal); }
.home-col.today .home-col-title { color: #FFFFFF; }
.home-col.today .home-col-count { background: rgba(255,255,255,0.22); color: #FFFFFF; border-color: transparent; }

.home-col.overdue .home-col-header { background: var(--state-overdue); border-bottom-color: var(--state-overdue); }
.home-col.overdue .home-col-title { color: #FFFFFF; }
.home-col.overdue .home-col-count { background: rgba(255,255,255,0.22); color: #FFFFFF; border-color: transparent; }

.home-col-body {
  flex: 1;
  padding: 0.6rem;
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
  /* Sin max-height ni overflow: que se expanda para mostrar todas las cards */
}

/* Si hay muchas cards (>12), activar scroll para no crecer indefinidamente */
.home-col-body.scrollable {
  overflow-y: auto;
  max-height: 620px;
}

/* Scrollbar fina en columnas */
.home-col-body::-webkit-scrollbar { width: 6px; }
.home-col-body::-webkit-scrollbar-track { background: transparent; }
.home-col-body::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
.home-col-body::-webkit-scrollbar-thumb:hover { background: var(--text-faint); }

.home-col-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem 1rem;
  color: var(--text-faint);
  font-size: 13px;
  text-align: center;
  gap: 0.6rem;
  height: 100%;
}

.home-col-empty-icon {
  font-size: 24px;
  opacity: 0.5;
}

/* Card de actividad en home */
.home-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.7rem 0.85rem;
  cursor: pointer;
  transition: all var(--duration) var(--ease);
  display: grid;
  grid-template-columns: 22px 1fr auto;
  gap: 0.65rem;
  align-items: center;
}

.home-card:hover {
  border-color: var(--royal);
  box-shadow: var(--shadow-sm);
  transform: translateY(-1px);
}

.home-card-check {
  width: 20px;
  height: 20px;
  border: 2px solid var(--border-strong);
  border-radius: 5px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  transition: all var(--duration);
  cursor: pointer;
}

.home-card-check:hover {
  border-color: var(--royal);
  background: var(--royal-10);
}

.home-card.done .home-card-check {
  background: var(--state-done);
  border-color: var(--state-done);
}

.home-card.done .home-card-check::after {
  content: "";
  width: 5px;
  height: 8px;
  border-right: 2px solid #FFFFFF;
  border-bottom: 2px solid #FFFFFF;
  transform: rotate(45deg);
  margin-top: -2px;
}

.home-card.overdue .home-card-check {
  border-color: var(--state-overdue);
  background: var(--state-overdue-bg);
}

.home-card.overdue .home-card-check::after {
  content: "!";
  color: var(--state-overdue);
  font-weight: 800;
  font-size: 12px;
}

.home-card-content {
  min-width: 0;
}

.home-card-frente {
  font-size: 9.5px;
  font-weight: 700;
  color: var(--royal);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 2px;
}

.home-card-name {
  font-size: 12.5px;
  color: var(--text);
  font-weight: 600;
  line-height: 1.35;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}

.home-card.done .home-card-name {
  color: var(--text-faint);
  text-decoration: line-through;
  text-decoration-color: var(--border-strong);
}

.home-card-meta {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 2px;
  font-size: 10.5px;
}

.home-card-date {
  font-weight: 700;
  color: var(--deep);
  white-space: nowrap;
}

.home-card-date.overdue { color: var(--state-overdue); }

.home-card-resp {
  font-size: 9.5px;
  color: var(--text-faint);
  font-weight: 600;
}

/* Burn indicator pequeño en el hero */
.home-burn {
  margin-top: 1.25rem;
  padding: 0.9rem 1.1rem;
  background: rgba(255, 255, 255, 0.08);
  border-radius: 10px;
  border: 1px solid rgba(255, 255, 255, 0.12);
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 1rem;
  align-items: center;
}

.home-burn-label {
  font-size: 10.5px;
  color: var(--on-deep-dim);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 700;
  margin-bottom: 4px;
}

.home-burn-value {
  font-size: 14px;
  color: var(--on-deep);
  font-weight: 600;
  line-height: 1.3;
}

.home-burn-value strong {
  font-weight: 700;
}

.home-burn-chart {
  width: 140px;
  height: 40px;
}

/* Layout: columnas + panel lateral */
.home-main-layout {
  display: grid;
  grid-template-columns: 1fr minmax(300px, 360px);
  gap: 1.25rem;
  align-items: start;
  transition: grid-template-columns 0.3s var(--ease);
}

/* Panel colapsado: solo franja lateral estrecha */
.home-main-layout.panel-collapsed {
  grid-template-columns: 1fr 48px;
}

/* En pantallas chicas, apilar (panel abajo) */
@media (max-width: 1100px) {
  .home-main-layout,
  .home-main-layout.panel-collapsed {
    grid-template-columns: 1fr;
  }
}

/* Stack vertical: 3 columnas arriba + Vencidas abajo */
.home-content-stack {
  display: flex;
  flex-direction: column;
  gap: 1.25rem;
}

/* Columnas de actividades (Hoy/Semana/Finalizadas) - 3 arriba */
.home-columns {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1.25rem;
}

/* En pantallas medianas-chicas: 1 columna */
@media (max-width: 900px) {
  .home-columns {
    grid-template-columns: 1fr;
  }
}

/* Fila de Vencidas: ocupa todo el ancho horizontal */
.home-overdue-row {
  display: block;
}

/* La columna de Vencidas se renderiza en horizontal cuando está en home-overdue-row */
.home-overdue-row .home-col {
  min-height: auto;
}

.home-overdue-row .home-col-body {
  max-height: 340px;
  /* Cards en grid horizontal cuando hay espacio */
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 0.4rem;
}

.home-overdue-row .home-col-empty {
  grid-column: 1 / -1;
}
.reuniones-panel {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-xs);
  position: sticky;
  top: 1rem;
  max-height: calc(100vh - 3rem);
  display: flex;
  flex-direction: column;
  transition: all 0.3s var(--ease);
}

/* Panel colapsado: franja vertical estrecha */
.reuniones-panel.collapsed {
  width: 48px;
  min-height: 180px;
}

.reuniones-panel-header {
  padding: 0.85rem 1.1rem;
  background: var(--bg-subtle);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.5rem;
  flex-shrink: 0;
}

.reuniones-panel.collapsed .reuniones-panel-header {
  flex-direction: column;
  padding: 0.6rem 0.3rem;
  gap: 0.35rem;
  border-bottom: none;
  height: 100%;
  justify-content: flex-start;
}

.reuniones-panel-toggle {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  width: 28px;
  height: 28px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-dim);
  transition: all var(--duration);
  flex-shrink: 0;
  padding: 0;
  font-family: inherit;
}

.reuniones-panel-toggle:hover {
  background: var(--royal-10);
  color: var(--royal);
  border-color: var(--royal);
}

.reuniones-panel-toggle svg {
  width: 14px;
  height: 14px;
  transition: transform 0.3s var(--ease);
}

.reuniones-panel.collapsed .reuniones-panel-toggle svg {
  transform: rotate(180deg);
}

/* Botón de refresh manual */
.reuniones-panel-actions {
  display: flex;
  align-items: center;
  gap: 0.35rem;
}

.reuniones-panel-refresh {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  width: 28px;
  height: 28px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-dim);
  transition: all var(--duration);
  flex-shrink: 0;
  padding: 0;
  font-family: inherit;
}

.reuniones-panel-refresh:hover:not(:disabled) {
  background: var(--royal-10);
  color: var(--royal);
  border-color: var(--royal);
}

.reuniones-panel-refresh:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.reuniones-panel-refresh svg {
  width: 13px;
  height: 13px;
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* Badge de conteo cuando está colapsado */
.reuniones-panel-collapsed-badge {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 0.35rem;
  padding-top: 0.3rem;
}

.reuniones-panel.collapsed .reuniones-panel-collapsed-badge {
  display: flex;
}

.reuniones-panel.collapsed .reuniones-panel-title {
  display: none;
}

.reuniones-panel-collapsed-count {
  background: var(--royal);
  color: #FFFFFF;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 800;
  padding: 3px 8px;
  letter-spacing: -0.02em;
  min-width: 24px;
  text-align: center;
  line-height: 1.1;
}

.reuniones-panel-collapsed-label {
  font-size: 9px;
  font-weight: 700;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  writing-mode: vertical-rl;
  transform: rotate(180deg);
  margin-top: 0.35rem;
}

.reuniones-panel-collapsed-live-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--state-done);
  animation: pulse-live-mini 2s infinite;
}

.reuniones-panel.collapsed .reuniones-panel-body {
  display: none;
}

.reuniones-panel-title {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 11.5px;
  font-weight: 700;
  color: var(--deep);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.reuniones-panel-title svg {
  width: 14px;
  height: 14px;
  color: var(--royal);
}

.reuniones-panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 0.65rem 0.55rem 0.8rem;
}

.reuniones-day-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-faint);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding: 0.4rem 0.55rem 0.35rem;
}

/* Card mini */
.reunion-mini {
  display: grid;
  grid-template-columns: 44px 1fr auto;
  gap: 0.55rem;
  padding: 0.55rem 0.6rem;
  border-radius: 7px;
  text-decoration: none;
  color: inherit;
  transition: all var(--duration);
  margin-bottom: 2px;
  align-items: center;
  border: 1px solid transparent;
}

.reunion-mini:hover {
  background: var(--royal-04);
  border-color: var(--royal-10);
  transform: translateX(1px);
}

.reunion-mini.past {
  opacity: 0.45;
}

.reunion-mini.past .reunion-mini-title {
  text-decoration: line-through;
  text-decoration-color: var(--border-strong);
}

.reunion-mini.live {
  background: linear-gradient(90deg, rgba(22, 163, 74, 0.1) 0%, transparent 100%);
  border-color: rgba(22, 163, 74, 0.25);
}

.reunion-mini.soon {
  background: linear-gradient(90deg, rgba(245, 158, 11, 0.1) 0%, transparent 100%);
  border-color: rgba(245, 158, 11, 0.25);
}

.reunion-mini-time {
  font-size: 12px;
  font-weight: 800;
  color: var(--deep);
  letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;

}

.reunion-mini.past .reunion-mini-time {
  color: var(--text-faint);
}

.reunion-mini-body {
  min-width: 0;
  line-height: 1.3;
}

.reunion-mini-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--deep);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  margin-bottom: 1px;
}

.reunion-mini-meta {
  font-size: 10.5px;
  color: var(--text-dim);
  font-weight: 500;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.reunion-mini-badge {
  font-size: 9.5px;
  font-weight: 800;
  padding: 2px 6px;
  border-radius: 8px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  white-space: nowrap;
}

.reunion-mini-badge.live {
  background: var(--state-done);

  animation: pulse-live-mini 2s infinite;
}

@keyframes pulse-live-mini {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.65; }
}

.reunion-mini-badge.soon {
  background: var(--state-progress-bg);
  color: #B45309;
  border: 1px solid rgba(245, 158, 11, 0.3);
}
