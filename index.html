  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const weekEnd = new Date(today.getTime() + 7 * 86400000);
  const weekAgo = new Date(today.getTime() - 7 * 86400000);

  // Clasificar actividades
  const hoy = [];
  const estaSemana = [];
  const vencidas = [];
  const recienFinalizadas = [];

  state.data.forEach(t => {
    if (!t.fecha) return;
    const estado = t.estado.toLowerCase();
    const isDone = estado === 'finalizado';

    if (isDone) {
      // Asumimos que si está finalizada y la fecha fue en los últimos 7 días, la "finalizó" recientemente
      // (no tenemos fecha real de finalización sin historial, pero es una aproximación útil)
      if (t.fecha >= weekAgo && t.fecha <= today) {
        recienFinalizadas.push(t);
      }
    } else {
      if (t.fecha.toDateString() === today.toDateString()) {
        hoy.push(t);
      } else if (t.fecha < today) {
        vencidas.push(t);
      } else if (t.fecha <= weekEnd) {
        estaSemana.push(t);
      }
    }
  });

  // Ordenar por fecha
  [hoy, estaSemana, vencidas].forEach(arr => arr.sort((a,b) => a.fecha - b.fecha));
  recienFinalizadas.sort((a,b) => b.fecha - a.fecha); // recientes primero

  // Saludo según hora
  const hour = now.getHours();
  const saludo = hour < 12 ? 'Buenos días' : hour < 19 ? 'Buenas tardes' : 'Buenas noches';
  const diaSemana = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'][now.getDay()];
  const fechaFmt = `${diaSemana}, ${now.getDate()} de ${['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'][now.getMonth()]}`;

  // Calcular status
  let statusHtml = '';
  const totalSemana = hoy.length + estaSemana.length;
  if (vencidas.length === 0 && totalSemana === 0) {
    statusHtml = 'Semana liviana, <span class="status-pill good">al día</span>';
  } else if (vencidas.length === 0) {
    statusHtml = `Tienes <strong>${totalSemana}</strong> actividades esta semana. <span class="status-pill good">al día</span>`;
  } else if (vencidas.length <= 3) {
    statusHtml = `<strong>${totalSemana}</strong> actividades esta semana y <span class="status-pill warn">${vencidas.length} vencidas</span>`;
  } else {
    statusHtml = `<strong>${totalSemana}</strong> esta semana y <span class="status-pill bad">${vencidas.length} vencidas</span> requieren atención`;
  }

  // Calcular burn rate para el hero
  const total = state.data.length;
  const done = state.data.filter(d => d.estado.toLowerCase() === 'finalizado').length;
  const pct = total ? Math.round(done/total*100) : 0;
  const restantes = total - done;

  // Proyección simple: si llevamos X días desde el inicio del año, y hemos cerrado Y, extrapolamos
  const inicioAnio = new Date(2026, 0, 1);
  const diasTranscurridos = Math.max(1, Math.round((today - inicioAnio) / 86400000));
  const finAnio = new Date(2026, 11, 31);
  const diasRestantes = Math.max(1, Math.round((finAnio - today) / 86400000));
  const velocityDaily = done / diasTranscurridos;
  const diasNecesarios = velocityDaily > 0 ? Math.round(restantes / velocityDaily) : 999;
  const fechaProyectada = new Date(today.getTime() + diasNecesarios * 86400000);

  let burnText, burnTag;
  if (restantes === 0) {
    burnText = 'Plan completado 🎉';
    burnTag = 'good';
  } else if (fechaProyectada <= finAnio) {
    const mesProyectado = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'][fechaProyectada.getMonth()];
    burnText = `Al ritmo actual terminas en <strong>${mesProyectado} ${fechaProyectada.getFullYear()}</strong>`;
    burnTag = 'good';
  } else {
    const diasAtraso = Math.round((fechaProyectada - finAnio) / 86400000);
    burnText = `Al ritmo actual terminas <strong>${diasAtraso} días</strong> después de diciembre`;
    burnTag = 'warn';
  }

  // Mini chart: completadas por semana (últimas 8 semanas) - aproximación usando fechas
  const semanas = 8;
  const puntos = [];
  for (let i = semanas - 1; i >= 0; i--) {
    const inicioSemana = new Date(today.getTime() - (i + 1) * 7 * 86400000);
    const finSemana = new Date(today.getTime() - i * 7 * 86400000);
    const count = state.data.filter(d =>
      d.estado.toLowerCase() === 'finalizado' &&
      d.fecha && d.fecha >= inicioSemana && d.fecha < finSemana
    ).length;
    puntos.push(count);
  }
  const maxPunto = Math.max(...puntos, 1);
  const sparklinePath = puntos.map((p, i) => {
    const x = (i / (semanas - 1)) * 140;
    const y = 32 - (p / maxPunto) * 28;
    return (i === 0 ? 'M' : 'L') + x.toFixed(1) + ' ' + y.toFixed(1);
  }).join(' ');

  let html = `
    <div class="home-hero">
      <div class="home-greeting">${fechaFmt}</div>
      <div class="home-title">${saludo}, Nicolás 👋</div>
      <div class="home-status">${statusHtml}</div>

      <div class="home-burn">
        <div>
          <div class="home-burn-label">Proyección</div>
          <div class="home-burn-value">${burnText} · ${done}/${total} completadas (${pct}%)</div>
        </div>
        <svg class="home-burn-chart" viewBox="0 0 140 40">
          <defs>
            <linearGradient id="sparklineGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="rgba(143, 177, 255, 0.5)"/>
              <stop offset="100%" stop-color="rgba(143, 177, 255, 0)"/>
            </linearGradient>
          </defs>
          <path d="${sparklinePath} L 140 32 L 0 32 Z" fill="url(#sparklineGrad)"/>
          <path d="${sparklinePath}" fill="none" stroke="#8FB1FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          ${puntos.map((p, i) => {
            const x = (i / (semanas - 1)) * 140;
            const y = 32 - (p / maxPunto) * 28;
            return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${i === puntos.length - 1 ? 2.5 : 1.5}" fill="#8FB1FF"/>`;
          }).join('')}
        </svg>
      </div>
    </div>

    <div class="home-main-layout${state.reunionesPanelCollapsed ? ' panel-collapsed' : ''}">
      <div class="home-content-stack">
        <div class="home-columns home-columns-top">
          ${renderHomeCol('today', 'Hoy', hoy, '<svg class="col-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><circle cx="12" cy="16" r="1.5" fill="currentColor"/></svg>', '🎉', 'Nada urgente hoy')}
          ${renderHomeCol('week', 'Esta semana', estaSemana, '<svg class="col-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>', '📅', 'Sin actividades esta semana')}
          ${renderHomeCol('done', 'Finalizadas recientemente', recienFinalizadas, '<svg class="col-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>', '🎯', 'Aún no hay finalizadas esta semana')}
        </div>

        <div class="home-overdue-row">
          ${renderHomeCol('overdue', 'Vencidas', vencidas, '<svg class="col-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><circle cx="12" cy="17" r="0.8" fill="currentColor"/></svg>', '✅', 'Sin vencidas, al día')}
        </div>
      </div>

      ${renderReunionesPanel()}
    </div>
  `;

  container.innerHTML = html;

  // Bindings
  container.querySelectorAll('.home-card').forEach(el => {
    el.addEventListener('click', (e) => {
      const idx = parseInt(el.dataset.idx);
      if (e.target.closest('.home-card-check')) {
        e.stopPropagation();
        const task = state.data[idx];
        if (!task) return;
        const currentEstado = task.estado.toLowerCase();
        const newEstado = currentEstado === 'finalizado' ? 'Pendiente' : 'Finalizado';
        if (USE_SUPABASE && task.id) {
          updateActividad(task.id, { estado: newEstado });
        } else {
          task.estado = newEstado;
          renderAll();
        }
        return;
      }
      openDrawer(state.data[idx]);
    });
  });
}

function renderHomeCol(kind, titulo, tasks, iconSvg, emptyIcon, emptyText) {
  const now = new Date();
  const scrollable = tasks.length > 12 ? 'scrollable' : '';
  let html = `
    <div class="home-col ${kind}">
      <div class="home-col-header">
        <div class="home-col-title">${iconSvg}${titulo}</div>
        <div class="home-col-count">${tasks.length}</div>
      </div>
      <div class="home-col-body ${scrollable}">
  `;

  if (tasks.length === 0) {
    html += `
      <div class="home-col-empty">
        <div class="home-col-empty-icon">${emptyIcon}</div>
        <div>${emptyText}</div>
      </div>
    `;
  } else {
    html += tasks.map(t => {
      const idx = state.data.indexOf(t);
      const estado = t.estado.toLowerCase();
      const isDone = estado === 'finalizado';
      const isOverdue = t.fecha && t.fecha < now && !isDone;
      let cardClass = 'home-card';
      if (isDone) cardClass += ' done';
      else if (isOverdue) cardClass += ' overdue';

      const resp = t.responsable || '';
      const initials = resp.split(/\s+/).filter(Boolean).slice(0, 2).map(s => s[0]).join('').toUpperCase();

      return `
        <div class="${cardClass}" data-idx="${idx}">
          <div class="home-card-check"></div>
          <div class="home-card-content">
            <div class="home-card-frente">${escapeHtml(t.frente)}</div>
            <div class="home-card-name">${escapeHtml(t.actividad)}</div>
          </div>
          <div class="home-card-meta">
            <div class="home-card-date ${isOverdue ? 'overdue' : ''}">${t.fechaStr || '—'}</div>
            ${initials ? `<div class="home-card-resp">${initials}</div>` : ''}
          </div>
        </div>
      `;
    }).join('');
  }

  html += `</div></div>`;
  return html;
}

/* ============================================================
   REUNIONES PANEL (Google Calendar - compacto lateral)
============================================================ */
function renderReunionesPanel() {
  if (!state.reuniones || state.reuniones.length === 0) {
    return '';
  }

  const now = new Date();
  const hoy = state.reuniones.filter(r => r.dia === 'hoy');
  const maniana = state.reuniones.filter(r => r.dia === 'mañana');

  const hoyActivas = hoy.filter(r => r.fin >= now);
  const hoyPasadas = hoy.filter(r => r.fin < now);
  const proxima = hoyActivas.find(r => r.inicio > now);
  const enCurso = hoyActivas.find(r => r.inicio <= now && r.fin >= now);

  const isCollapsed = state.reunionesPanelCollapsed;
  const totalPendientes = hoyActivas.length + maniana.length;

  // Layout colapsado: solo franjita con badge
  if (isCollapsed) {
    return `
      <aside class="reuniones-panel collapsed">
        <div class="reuniones-panel-header">
          <button class="reuniones-panel-toggle" onclick="toggleReunionesPanel()" title="Expandir calendario">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <div class="reuniones-panel-collapsed-badge">
            ${enCurso ? '<div class="reuniones-panel-collapsed-live-dot" title="Reunión en curso"></div>' : ''}
            <div class="reuniones-panel-collapsed-count" title="${totalPendientes} reuniones (hoy + mañana)">${totalPendientes}</div>
          </div>
          <div class="reuniones-panel-collapsed-label">Calendario</div>
        </div>
      </aside>
    `;
  }

  // Layout expandido
  let html = `
    <aside class="reuniones-panel">
      <div class="reuniones-panel-header">
        <div class="reuniones-panel-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span>Calendario</span>
        </div>
        <div class="reuniones-panel-actions">
          <button class="reuniones-panel-refresh" onclick="manualRefreshReuniones(event)" title="Actualizar reuniones">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          </button>
          <button class="reuniones-panel-toggle" onclick="toggleReunionesPanel()" title="Colapsar calendario">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
        </div>
      </div>
      <div class="reuniones-panel-body">
  `;

  if (hoy.length > 0) {
    html += `<div class="reuniones-day-label">Hoy · ${hoyActivas.length} por venir${hoyPasadas.length ? ' · ' + hoyPasadas.length + ' ya pasaron' : ''}</div>`;
    html += [...hoyActivas, ...hoyPasadas].map(r => renderReunionMini(r, now)).join('');
  }

  if (maniana.length > 0) {
    html += `<div class="reuniones-day-label" style="margin-top: 0.85rem">Mañana · ${maniana.length}</div>`;
    html += maniana.map(r => renderReunionMini(r, now)).join('');
  }

  html += `</div></aside>`;
  return html;
}

// Toggle del panel colapsado
function toggleReunionesPanel() {
  state.reunionesPanelCollapsed = !state.reunionesPanelCollapsed;
  renderHome();
}

// Refresca solo el panel de reuniones (sin re-renderizar todo Mi semana)
// Útil para actualizar "En curso" y "en X min" cada minuto
function refreshReunionesPanel() {
  const existingPanel = document.querySelector('.reuniones-panel');
  if (!existingPanel) return;

  const newHtml = renderReunionesPanel();
  if (!newHtml) {
    existingPanel.remove();
    return;
  }

  // Crear un contenedor temporal para parsear el HTML nuevo
  const temp = document.createElement('div');
  temp.innerHTML = newHtml.trim();
  const newPanel = temp.firstElementChild;

  if (newPanel) {
    existingPanel.replaceWith(newPanel);
  }
}

// Refresh manual con feedback visual
async function manualRefreshReuniones(event) {
  event.stopPropagation();
  const btn = event.currentTarget;
  const svg = btn.querySelector('svg');

  btn.disabled = true;
  if (svg) svg.style.animation = 'spin 0.8s linear';

  await refreshReunionesFromSupabase();

  setTimeout(() => {
    btn.disabled = false;
    if (svg) svg.style.animation = '';
  }, 800);
}

// Refresca las reuniones desde Supabase y actualiza el panel
async function refreshReunionesFromSupabase() {
  if (!USE_SUPABASE) return;
  try {
    const reunionesRows = await supabaseRequest('reuniones_cache?select=*&order=inicio.asc');
    state.reuniones = Array.isArray(reunionesRows) ? reunionesRows.map(r => ({
      ...r,
      inicio: new Date(r.inicio),
      fin: new Date(r.fin)
    })) : [];
    if (state.view === 'home') {
      refreshReunionesPanel();
    }
  } catch (e) {
    console.warn('Error refrescando reuniones:', e);
  }
}

function renderReunionMini(r, now) {
  const inicio = r.inicio instanceof Date ? r.inicio : new Date(r.inicio);
  const fin = r.fin instanceof Date ? r.fin : new Date(r.fin);
  const pad = n => String(n).padStart(2, '0');
  const horaInicio = `${pad(inicio.getHours())}:${pad(inicio.getMinutes())}`;

  const isPast = fin < now;
  const isNow = inicio <= now && fin >= now;
  const minutosHasta = Math.round((inicio - now) / 60000);
  const isNext = !isPast && !isNow && minutosHasta > 0 && minutosHasta <= 60;

  let classes = 'reunion-mini';
  if (isPast) classes += ' past';
  else if (isNow) classes += ' live';
  else if (isNext) classes += ' soon';

  // Lista de participantes para tooltip
  const invitados = r.invitados || '';
  const numInv = r.num_invitados || 0;

  // Texto de participantes para mostrar
  let participantesTexto = '';
  if (numInv === 0) {
    participantesTexto = 'Personal';
  } else if (numInv === 1) {
    // Solo una persona: mostrar nombre
    participantesTexto = `con ${invitados.split(',')[0].trim()}`;
  } else if (numInv <= 3) {
    // 2-3 personas: mostrar todos los nombres (primeros)
    const nombres = invitados.split(',').map(s => s.trim()).slice(0, numInv);
    participantesTexto = `con ${nombres.join(', ')}`;
  } else {
    // 4+: mostrar primeros 2 y +N más
    const nombres = invitados.split(',').map(s => s.trim());
    participantesTexto = `${nombres.slice(0, 2).join(', ')} +${numInv - 2} más`;
  }

  const openLink = r.meet_link || r.calendar_link || '';
  const tooltipTitle = invitados ? `Participantes: ${invitados}` : '';

  let badge = '';
  if (isNow) {
    badge = '<span class="reunion-mini-badge live">En curso</span>';
  } else if (isNext) {
    badge = `<span class="reunion-mini-badge soon">en ${minutosHasta}min</span>`;
  }

  // Escapar el link para usarlo en onclick
  const safeLink = openLink.replace(/'/g, "\\'").replace(/"/g, '&quot;');

  return `
    <a href="${openLink}" target="_blank" rel="noopener noreferrer" class="${classes}"
       ${tooltipTitle ? `title="${escapeHtml(tooltipTitle)}"` : ''}
       onclick="openReunionLink(event, '${safeLink}')">
      <div class="reunion-mini-time">${horaInicio}</div>
      <div class="reunion-mini-body">
        <div class="reunion-mini-title">${escapeHtml(r.titulo)}</div>
        <div class="reunion-mini-meta">${escapeHtml(participantesTexto)}${r.meet_link ? ' · 🎥' : ''}</div>
      </div>
      ${badge}
    </a>
  `;
}

// Abre el link de reunión, con fallback para file:// local
function openReunionLink(event, url) {
  console.log('[Reunión] Intentando abrir:', url);

  if (!url || url === '' || url === '#') {
    console.warn('[Reunión] URL vacía');
    event.preventDefault();
    return;
  }

  // Prevenir navegación default del anchor para controlar manualmente
  event.preventDefault();

  // Intentar abrir con window.open
  try {
    const opened = window.open(url, '_blank', 'noopener,noreferrer');
    if (opened) {
      console.log('[Reunión] Abierto correctamente');
      return;
    }
    console.warn('[Reunión] window.open retornó null (popup bloqueado?)');
  } catch (e) {
    console.error('[Reunión] Error en window.open:', e);
  }

  // Fallback 1: simular click en un link temporal
  try {
    const a = document.createElement('a');
    a.href = url;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    console.log('[Reunión] Abierto con fallback anchor');
    return;
  } catch (e) {
    console.error('[Reunión] Error en fallback anchor:', e);
  }

  // Fallback 2: cambiar la ventana actual
  window.location.href = url;
}

/* ============================================================
   METRICS VIEW
============================================================ */
function renderMetrics() {
  const container = document.getElementById('metrics');
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

  const data = state.data;
  const total = data.length;
  const done = data.filter(d => d.estado.toLowerCase() === 'finalizado').length;
  const restantes = total - done;
  const pct = total ? Math.round(done/total*100) : 0;

  // Velocity: últimas 12 semanas
  const semanas = 12;
  const velocityPoints = [];
  for (let i = semanas - 1; i >= 0; i--) {
    const inicioSemana = new Date(today.getTime() - (i + 1) * 7 * 86400000);
    const finSemana = new Date(today.getTime() - i * 7 * 86400000);
    const count = data.filter(d =>
      d.estado.toLowerCase() === 'finalizado' &&
      d.fecha && d.fecha >= inicioSemana && d.fecha < finSemana
    ).length;
    velocityPoints.push({ semana: i, count, inicio: inicioSemana, fin: finSemana });
  }
  const velocityPromedio = velocityPoints.reduce((s, p) => s + p.count, 0) / semanas;
  const velocityUlt4 = velocityPoints.slice(-4).reduce((s,p) => s+p.count, 0) / 4;
  const velocityTrend = velocityUlt4 > velocityPromedio * 1.1 ? 'up' :
                        velocityUlt4 < velocityPromedio * 0.9 ? 'down' : 'flat';

  // Burn: proyección
  const inicioAnio = new Date(2026, 0, 1);
  const finAnio = new Date(2026, 11, 31);
  const diasTranscurridos = Math.max(1, Math.round((today - inicioAnio) / 86400000));
  const diasAnio = Math.round((finAnio - inicioAnio) / 86400000);
  const velocityDaily = done / diasTranscurridos;
  const diasNecesarios = velocityDaily > 0 ? Math.round(restantes / velocityDaily) : 999;
  const fechaProyectada = new Date(today.getTime() + diasNecesarios * 86400000);
  const mesesEs = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

  let burnTag, burnSubtitle, burnValue;
  if (restantes === 0) {
    burnValue = '¡Completo!';
    burnTag = { text: 'Plan finalizado', cls: 'good' };
    burnSubtitle = '';
  } else if (fechaProyectada <= finAnio) {
    const diff = Math.round((finAnio - fechaProyectada) / 86400000);
    burnValue = `${mesesEs[fechaProyectada.getMonth()]} ${fechaProyectada.getDate()}`;
    burnTag = { text: `${diff} días antes`, cls: 'good' };
    burnSubtitle = `Al ritmo actual de ${velocityDaily.toFixed(1)} actividades/día`;
  } else {
    const diff = Math.round((fechaProyectada - finAnio) / 86400000);
    burnValue = `${mesesEs[fechaProyectada.getMonth()]} ${fechaProyectada.getDate()}`;
    burnTag = { text: `${diff} días tarde`, cls: 'bad' };
    burnSubtitle = `Necesitas acelerar. Hoy vas a ${velocityDaily.toFixed(1)} actividades/día`;
  }

  // Distribución por frente
  const frenteCounts = {};
  data.forEach(d => {
    if (!frenteCounts[d.frente]) frenteCounts[d.frente] = { total: 0, done: 0 };
    frenteCounts[d.frente].total++;
    if (d.estado.toLowerCase() === 'finalizado') frenteCounts[d.frente].done++;
  });
  const frenteDist = Object.entries(frenteCounts)
    .map(([f, c]) => ({ frente: f, ...c, pct: Math.round(c.done/c.total*100) }))
    .sort((a,b) => b.total - a.total);

  // Vencidas trending (últimos 6 meses)
  const vencidasTrend = [];
  for (let i = 5; i >= 0; i--) {
    const mesRef = new Date(today.getFullYear(), today.getMonth() - i, 15);
    const finMes = new Date(mesRef.getFullYear(), mesRef.getMonth() + 1, 0);
    // Actividades cuya fecha fue antes de fin de ese mes y nunca se finalizaron O se finalizaron después
    const vencidas = data.filter(d => {
      if (!d.fecha) return false;
      return d.fecha < finMes && d.fecha.getMonth() === mesRef.getMonth() && d.estado.toLowerCase() !== 'finalizado';
    }).length;
    vencidasTrend.push({ mes: mesRef, count: vencidas });
  }

  // Actividades por mes
  const actsPorMes = {};
  data.forEach(d => {
    if (!d.fecha) return;
    const key = `${d.fecha.getFullYear()}-${String(d.fecha.getMonth()+1).padStart(2,'0')}`;
    if (!actsPorMes[key]) actsPorMes[key] = { total: 0, done: 0 };
    actsPorMes[key].total++;
    if (d.estado.toLowerCase() === 'finalizado') actsPorMes[key].done++;
  });
  const mesesOrdenados = Object.keys(actsPorMes).sort();

  const trendArrow = velocityTrend === 'up' ? '↑' : velocityTrend === 'down' ? '↓' : '→';
  const trendClass = velocityTrend === 'up' ? 'good' : velocityTrend === 'down' ? 'bad' : 'warn';

  const chartsId = Date.now();

  container.innerHTML = `
    <div class="metrics-grid">

      <div class="metric-card">
        <div class="metric-card-header">
          <div>
            <div class="metric-card-title">Velocity promedio</div>
            <div class="metric-card-value">${velocityPromedio.toFixed(1)}<span class="unit">/ semana</span></div>
            <div class="metric-card-subtitle">Últimas 12 semanas</div>
          </div>
          <div class="metric-card-tag ${trendClass}">${trendArrow} ${velocityTrend === 'up' ? 'Acelerando' : velocityTrend === 'down' ? 'Desacelerando' : 'Estable'}</div>
        </div>
        <div class="metric-chart" id="chart-velocity-${chartsId}"></div>
      </div>

      <div class="metric-card">
        <div class="metric-card-header">
          <div>
            <div class="metric-card-title">Proyección de término</div>
            <div class="metric-card-value">${burnValue}</div>
            <div class="metric-card-subtitle">${burnSubtitle}</div>
          </div>
          <div class="metric-card-tag ${burnTag.cls}">${burnTag.text}</div>
        </div>
        <div class="metric-chart" id="chart-burn-${chartsId}"></div>
      </div>

      <div class="metric-card wide">
        <div class="metric-card-header">
          <div>
            <div class="metric-card-title">Distribución por frente</div>
            <div class="metric-card-value">${frenteDist.length}<span class="unit">frentes</span></div>
            <div class="metric-card-subtitle">${done} finalizadas · ${restantes} pendientes</div>
          </div>
        </div>
        <div class="dist-list">
          ${frenteDist.map(f => `
            <div class="dist-item">
              <div class="dist-item-label">${escapeHtml(f.frente)}</div>
              <div class="dist-item-bar">
                <div class="dist-item-fill" style="width:${(f.total / frenteDist[0].total * 100).toFixed(1)}%">
                  <div class="dist-item-fill done" style="width:${f.total > 0 ? (f.done / f.total * 100).toFixed(1) : 0}%; background:var(--state-done); height:100%"></div>
                </div>
              </div>
              <div class="dist-item-stats">${f.done}/${f.total} · ${f.pct}%</div>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="metric-card wide">
        <div class="metric-card-header">
          <div>
            <div class="metric-card-title">Carga por mes</div>
            <div class="metric-card-value">${mesesOrdenados.length}<span class="unit">meses</span></div>
            <div class="metric-card-subtitle">Actividades planeadas vs finalizadas</div>
          </div>
        </div>
        <div class="metric-chart tall" id="chart-months-${chartsId}"></div>
      </div>

    </div>
  `;

  // Dibujar charts SVG
  drawVelocityChart(`chart-velocity-${chartsId}`, velocityPoints);
  drawBurnChart(`chart-burn-${chartsId}`, data, today, finAnio);
  drawMonthsChart(`chart-months-${chartsId}`, mesesOrdenados, actsPorMes);
}

function drawVelocityChart(elId, points) {
  const el = document.getElementById(elId);
  if (!el) return;
  const w = el.clientWidth || 400;
  const h = 180;
  const padding = { top: 20, right: 15, bottom: 30, left: 30 };
  const innerW = w - padding.left - padding.right;
  const innerH = h - padding.top - padding.bottom;

  const maxCount = Math.max(...points.map(p => p.count), 3);
  const stepX = innerW / (points.length - 1);

  const line = points.map((p, i) => {
    const x = padding.left + i * stepX;
    const y = padding.top + innerH - (p.count / maxCount) * innerH;
    return `${i === 0 ? 'M' : 'L'} ${x.toFixed(1)} ${y.toFixed(1)}`;
  }).join(' ');

  const area = line + ` L ${(padding.left + innerW).toFixed(1)} ${padding.top + innerH} L ${padding.left} ${padding.top + innerH} Z`;

  const dots = points.map((p, i) => {
    const x = padding.left + i * stepX;
    const y = padding.top + innerH - (p.count / maxCount) * innerH;
    return `<g class="velocity-point" data-count="${p.count}" data-week="${p.inicio.getDate()}/${p.inicio.getMonth()+1}">
      <circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="10" fill="transparent"/>
      <circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3" fill="var(--royal)"/>
    </g>`;
  }).join('');

  // Y axis gridlines
  const gridY = [];
  for (let i = 0; i <= 3; i++) {
    const y = padding.top + (i / 3) * innerH;
    const val = Math.round(maxCount - (i / 3) * maxCount);
    gridY.push(`
      <line x1="${padding.left}" y1="${y.toFixed(1)}" x2="${(padding.left + innerW).toFixed(1)}" y2="${y.toFixed(1)}" stroke="var(--border)" stroke-width="1"/>
      <text x="${padding.left - 8}" y="${(y + 4).toFixed(1)}" text-anchor="end" font-size="10" fill="var(--text-faint)" font-weight="600">${val}</text>
    `);
  }

  el.innerHTML = `
    <svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
      <defs>
        <linearGradient id="velGrad-${elId}" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="var(--royal)" stop-opacity="0.25"/>
          <stop offset="100%" stop-color="var(--royal)" stop-opacity="0"/>
        </linearGradient>
      </defs>
      ${gridY.join('')}
      <path d="${area}" fill="url(#velGrad-${elId})"/>
      <path d="${line}" fill="none" stroke="var(--royal)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      ${dots}
    </svg>
    <div class="chart-tooltip" id="tip-${elId}"></div>
  `;

  // Tooltips
  const tip = document.getElementById(`tip-${elId}`);
  el.querySelectorAll('.velocity-point').forEach(g => {
    g.addEventListener('mouseenter', e => {
      const rect = el.getBoundingClientRect();
      const circle = g.querySelector('circle:last-child');
      const cx = parseFloat(circle.getAttribute('cx'));
      const cy = parseFloat(circle.getAttribute('cy'));
      tip.innerHTML = `<div class="chart-tooltip-label">Semana del ${g.dataset.week}</div>${g.dataset.count} finalizadas`;
      tip.style.left = (cx / w * rect.width) + 'px';
      tip.style.top = (cy / h * rect.height) + 'px';
      tip.classList.add('visible');
    });
    g.addEventListener('mouseleave', () => tip.classList.remove('visible'));
  });
}

function drawBurnChart(elId, data, today, finAnio) {
  const el = document.getElementById(elId);
  if (!el) return;
  const w = el.clientWidth || 400;
  const h = 180;
  const padding = { top: 20, right: 15, bottom: 30, left: 30 };
  const innerW = w - padding.left - padding.right;
  const innerH = h - padding.top - padding.bottom;

  // Línea ideal: del total actual a 0 desde hoy hasta diciembre
  const total = data.length;
  const done = data.filter(d => d.estado.toLowerCase() === 'finalizado').length;
  const restantes = total - done;

  const diasHasta = Math.max(1, Math.round((finAnio - today) / 86400000));

  // Puntos reales: proyección lineal
  const velocityDaily = done / Math.max(1, Math.round((today - new Date(2026,0,1)) / 86400000));
  const proyeccion = [];
  for (let i = 0; i <= 12; i++) {
    const dia = i * diasHasta / 12;
    const restanteIdeal = restantes * (1 - i / 12);
    const restanteReal = Math.max(0, restantes - velocityDaily * dia);
    proyeccion.push({ dia, ideal: restanteIdeal, real: restanteReal });
  }

  const maxY = restantes;
  const stepX = innerW / (proyeccion.length - 1);

  const makeLine = (key) => proyeccion.map((p, i) => {
    const x = padding.left + i * stepX;
    const y = padding.top + innerH - (p[key] / maxY) * innerH;
    return `${i === 0 ? 'M' : 'L'} ${x.toFixed(1)} ${y.toFixed(1)}`;
  }).join(' ');

  const lineIdeal = makeLine('ideal');
  const lineReal = makeLine('real');

  // Gridlines
  const gridY = [];
  for (let i = 0; i <= 3; i++) {
    const y = padding.top + (i / 3) * innerH;
    const val = Math.round(maxY - (i / 3) * maxY);
    gridY.push(`
      <line x1="${padding.left}" y1="${y.toFixed(1)}" x2="${(padding.left + innerW).toFixed(1)}" y2="${y.toFixed(1)}" stroke="var(--border)" stroke-width="1"/>
      <text x="${padding.left - 8}" y="${(y + 4).toFixed(1)}" text-anchor="end" font-size="10" fill="var(--text-faint)" font-weight="600">${val}</text>
    `);
  }

  el.innerHTML = `
    <svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
      ${gridY.join('')}
      <path d="${lineIdeal}" fill="none" stroke="var(--text-faint)" stroke-width="1.5" stroke-dasharray="4 4"/>
      <path d="${lineReal}" fill="none" stroke="var(--royal)" stroke-width="2.5" stroke-linecap="round"/>
      <text x="${padding.left + innerW - 4}" y="${(padding.top + 12).toFixed(1)}" text-anchor="end" font-size="10" fill="var(--text-faint)" font-weight="600">— Ideal ·  <tspan fill="var(--royal)">— Proyectado</tspan></text>
    </svg>
  `;
}

function drawMonthsChart(elId, meses, data) {
  const el = document.getElementById(elId);
  if (!el) return;
  if (meses.length === 0) return;

  const w = el.clientWidth || 600;
  const h = 240;
  const padding = { top: 20, right: 15, bottom: 55, left: 35 };
  const innerW = w - padding.left - padding.right;
  const innerH = h - padding.top - padding.bottom;

  const maxVal = Math.max(...meses.map(m => data[m].total), 1);
  const barW = Math.min(40, (innerW - (meses.length - 1) * 6) / meses.length);
  const stepX = barW + 6;

  const gridY = [];
  for (let i = 0; i <= 4; i++) {
    const y = padding.top + (i / 4) * innerH;
    const val = Math.round(maxVal - (i / 4) * maxVal);
    gridY.push(`
      <line x1="${padding.left}" y1="${y.toFixed(1)}" x2="${(padding.left + innerW).toFixed(1)}" y2="${y.toFixed(1)}" stroke="var(--border)" stroke-width="1"/>
      <text x="${padding.left - 8}" y="${(y + 4).toFixed(1)}" text-anchor="end" font-size="10" fill="var(--text-faint)" font-weight="600">${val}</text>
    `);
  }

  const mesesEs = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const nowKey = `${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2,'0')}`;

  const bars = meses.map((m, i) => {
    const [y, mo] = m.split('-').map(Number);
    const stats = data[m];
    const x = padding.left + i * stepX;
    const totalH = (stats.total / maxVal) * innerH;
    const doneH = (stats.done / maxVal) * innerH;
    const isCurrent = m === nowKey;

    const label = `${mesesEs[mo-1]} '${String(y).slice(-2)}`;

    return `
      <g class="month-bar" data-total="${stats.total}" data-done="${stats.done}" data-label="${label}">
        <rect x="${x}" y="${(padding.top + innerH - totalH).toFixed(1)}" width="${barW}" height="${totalH.toFixed(1)}" 
              fill="${isCurrent ? 'var(--royal-10)' : 'var(--bg-subtle)'}" rx="3"/>
        <rect x="${x}" y="${(padding.top + innerH - doneH).toFixed(1)}" width="${barW}" height="${doneH.toFixed(1)}" 
              fill="var(--state-done)" rx="3"/>
        <text x="${(x + barW/2).toFixed(1)}" y="${(padding.top + innerH + 16).toFixed(1)}" text-anchor="middle" 
              font-size="10.5" fill="${isCurrent ? 'var(--royal)' : 'var(--text-dim)'}" font-weight="700">${label}</text>
      </g>
    `;
  }).join('');

  el.innerHTML = `
    <svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet">
      ${gridY.join('')}
      ${bars}
      <text x="${padding.left + innerW - 4}" y="${(padding.top + 12).toFixed(1)}" text-anchor="end" font-size="10" fill="var(--text-faint)" font-weight="600">
        <tspan fill="var(--state-done)">■</tspan> Finalizadas ·  <tspan fill="var(--border-strong)">■</tspan> Planeadas
      </text>
    </svg>
    <div class="chart-tooltip" id="tip-${elId}"></div>
  `;

  const tip = document.getElementById(`tip-${elId}`);
  el.querySelectorAll('.month-bar').forEach(g => {
    g.addEventListener('mouseenter', e => {
      const rect = el.getBoundingClientRect();
      const barRect = g.getBBox();
      tip.innerHTML = `<div class="chart-tooltip-label">${g.dataset.label}</div>${g.dataset.done}/${g.dataset.total} finalizadas`;
      tip.style.left = ((barRect.x + barRect.width/2) / w * rect.width) + 'px';
      tip.style.top = (barRect.y / h * rect.height) + 'px';
      tip.classList.add('visible');
    });
    g.addEventListener('mouseleave', () => tip.classList.remove('visible'));
  });
}

async function guardarOrdenFrentes(frentesOrdenados) {
  if (!USE_SUPABASE) return;

  // Actualizar state local
  const nuevoOrden = {};
  frentesOrdenados.forEach((f, i) => { nuevoOrden[f] = i + 1; });
  state.frenteOrden = nuevoOrden;

  try {
    setSourceStatus('sync', 'Guardando orden…');

    // Upsert: insertar o actualizar cada frente con su nueva posición
    const payload = frentesOrdenados.map((f, i) => ({
      frente: f,
      posicion: i + 1
    }));

    await supabaseRequest('frente_orden', {
      method: 'POST',
      headers: {
        'Prefer': 'resolution=merge-duplicates,return=minimal'
      },
      body: JSON.stringify(payload)
    });

    state.lastSync = new Date();
    setSourceStatus('live', `Orden guardado · ${formatTime(state.lastSync)}`);
  } catch (e) {
    console.error('Error guardando orden:', e);
    setSourceStatus('error', 'Error al guardar orden');
  }
}

function setSourceStatus(kind, text) {
  const badge = document.getElementById('source-badge');
  const dot = badge?.querySelector('.source-badge-dot');
  const textEl = document.getElementById('source-text');
  if (!textEl) return;
  textEl.textContent = text;
  if (dot) {
    dot.style.background =
      kind === 'live' ? 'var(--state-done)' :
      kind === 'sync' ? 'var(--state-progress)' :
      kind === 'error' ? 'var(--state-overdue)' :
      'var(--state-pending)';
  }
}

function formatTime(d) {
  return d.toLocaleTimeString('es', { hour: '2-digit', minute: '2-digit' });
}

function formatFechaEspanol(iso) {
  const [y, m, day] = iso.split('-').map(Number);
  const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return `${day} ${meses[m-1]}`;
}

function parseFechaEspanolToIso(str) {
  if (!str) return null;
  const m = str.toString().trim().toLowerCase().match(/(\d+)\s+(\w+)(?:\s+(\d{4}))?/);
  if (!m) return null;
  const mes = MESES[m[2]];
  if (mes === undefined) return null;
  const year = m[3] ? parseInt(m[3]) : 2026;
  return `${year}-${String(mes+1).padStart(2,'0')}-${String(parseInt(m[1])).padStart(2,'0')}`;
}

function parseData(raw) {
  return raw.map(r => {
    const fechaStr = r['Fecha cierre'] || '';
    const fechaIso = r['Fecha cierre_iso'] || parseFechaEspanol(fechaStr);
    return {
      frente: (r['Frente'] || '').trim(),
      proyecto: (r['Proyecto'] || '').trim(),
      actividad: (r['Actividad'] || '').trim(),
      fechaStr: fechaStr,
      fecha: fechaIso ? new Date(fechaIso + 'T12:00:00') : null,
      responsable: (r['Responsable'] || '').trim(),
      estado: (r['Estado'] || 'Pendiente').trim() || 'Pendiente',
      notas: (r['Notas'] || '').trim(),
    };
  }).filter(r => r.frente && r.actividad);
}

function parseFechaEspanol(str) {
  if (!str) return null;
  const m = str.toString().trim().toLowerCase().match(/(\d+)\s+(\w+)(?:\s+(\d{4}))?/);
  if (!m) return null;
  const mes = MESES[m[2]];
  if (mes === undefined) return null;
  const year = m[3] ? parseInt(m[3]) : 2026;
  return `${year}-${String(mes+1).padStart(2,'0')}-${String(parseInt(m[1])).padStart(2,'0')}`;
}

function buildSidebar() {
  const now = new Date();
  const weekEnd = new Date(now.getTime() + 7*86400000);

  const countToday = state.data.filter(d => d.fecha && d.fecha.toDateString() === now.toDateString()).length;
  const countWeek = state.data.filter(d => d.fecha && d.fecha >= now && d.fecha <= weekEnd).length;
  const countOverdue = state.data.filter(d => d.fecha && d.fecha < now && d.estado.toLowerCase() !== 'finalizado').length;

  const quickFilters = [
    { id: 'all', name: 'Todas',
      icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M3 12h18"/><path d="M3 18h18"/></svg>',
      count: state.data.length },
    { id: 'today', name: 'Hoy',
      icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><circle cx="12" cy="16" r="1.5" fill="currentColor"/></svg>',
      count: countToday },
    { id: 'week', name: 'Esta semana',
      icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
      count: countWeek },
    { id: 'overdue', name: 'Vencidas',
      icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><circle cx="12" cy="17" r="0.8" fill="currentColor"/></svg>',
